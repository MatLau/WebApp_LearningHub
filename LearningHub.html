ese (es. comunicazione supplenza, convocazione organo collegiale, ordine del giorno). Per ciascuno scrivi il prompt RCOF e genera la bozza. Salva i 3 template. Poi identifica UN atto che NON dovresti mai delegare all'IA (es. atto disciplinare) e scrivi perché.","rifl":"Nella tua scuola, chi scrive gli ordini del giorno per il Collegio Docenti e per il CdI? Quanto tempo richiede? Come proporresti di ottimizzare questo processo?"},"h":"\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>✅ L'IA supporta efficacemente\u003c/div>\u003cdiv class='mcp'>Comunicazioni supplenze, convocazioni organi collegiali, ordini del giorno, comunicazioni ferie approvate, circolari interne, verbali da appunti, comunicazioni PNRR alle famiglie.\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>❌ Richiede supervisione specialistica\u003c/div>\u003cdiv class='mcp'>Atti disciplinari formali (competenza giuridica), calcoli stipendiali (verifica contabile), contratti con clausole non standard, provvedimenti con rilevanza penale.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">D.Lgs. 165/2001 — D.Lgs. 30 marzo 2001 n. 165\u003c/div>\u003cdiv class=\"norma-d\">Art. 55-bis: responsabilità disciplinare del dipendente pubblico per atti irregolari. Gli atti disciplinari formali richiedono procedure precise — l'IA può produrre bozze ma la supervisione giuridica è sempre necessaria prima della firma.\u003c/div>\u003c/div>\u003c/div>"},{"t":"IA e gestionali: chi fa cosa (e dove l'IA non entra)","sl":{"prova":"Prendi un compito che svolgi spesso (es. una convocazione o un avviso alle famiglie) e separa su due colonne: cosa fa la piattaforma/gestionale e cosa potresti far agevolare dall'IA attorno ad esso.","rifl":"Quante volte, in una pratica, l'IA serve davvero a produrre l'atto e quante invece serve solo a scriverne o spiegarne il contorno?"},"h":"\n  \u003cp class='lp'>Gran parte del lavoro di segreteria è già \u003cstrong>strutturato e tracciato\u003c/strong> dentro i gestionali (Argo, Spaggiari/Classeviva, Madisoft Nuvola…) e le piattaforme ministeriali. Questi sistemi \u003cstrong>fanno l'atto\u003c/strong>: l'IA non li sostituisce e non deve ricevere i dati reali che vi risiedono. L'IA aiuta a \u003cstrong>scrivere e capire ciò che gira attorno all'atto\u003c/strong>.\u003c/p>\n\n  \u003cdiv class='ib dan'>\u003cdiv class='ibt'>Esempio chiave: le convocazioni per le supplenze\u003c/div>\n  \u003cp>Le convocazioni da graduatoria d'istituto si gestiscono \u003cstrong>su SIDI\u003c/strong> (Applicazioni SIDI → Reclutamento → Convocazioni): la segreteria invia la convocazione elettronica e l'aspirante risponde tramite un link che lo porta su Istanze OnLine, dove accetta o rifiuta. È un flusso chiuso e tracciato: \u003cstrong>non\u003c/strong> un testo libero da scrivere con l'IA.\u003c/p>\u003c/div>\n\n  \u003ctable class='dtbl'>\n    \u003ctr>\u003cth>Piattaforma / sistema\u003c/th>\u003cth>Cosa gestisce (l'IA non entra)\u003c/th>\u003cth>Apporto dell'IA, attorno\u003c/th>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>SIDI\u003c/strong>\u003c/td>\u003ctd>Graduatorie, convocazioni telematiche, contratti, Anagrafe Studenti, fascicoli, flussi verso il MIM.\u003c/td>\u003ctd>Spiegare la procedura; bozza della comunicazione di accompagnamento.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>NoiPA\u003c/strong>\u003c/td>\u003ctd>Stato giuridico-economico, stipendi e cedolini del personale.\u003c/td>\u003ctd>Nessun ruolo sui dati; spiegare voci e procedure al personale.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Pago In Rete / PagoPA\u003c/strong>\u003c/td>\u003ctd>Contributi e pagamenti delle famiglie.\u003c/td>\u003ctd>Bozza dell'avviso alle famiglie (senza dati reali).\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Sistema di Interscambio\u003c/strong>\u003c/td>\u003ctd>Fatturazione elettronica verso la PA.\u003c/td>\u003ctd>Nessun ruolo; al più spiegare gli adempimenti.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Gestionali\u003c/strong> (Argo, Spaggiari, Nuvola)\u003c/td>\u003ctd>Protocollo, registro elettronico, alunni, personale, segreteria digitale, conservazione.\u003c/td>\u003ctd>Bozze di testo e sintesi; mai inserimento di dati reali.\u003c/td>\u003c/tr>\n  \u003c/table>\n\n  \u003cdiv class='g2'>\n    \u003cdiv class='ib suc'>\u003cdiv class='ibt'>✦ Dove l'IA agevola davvero\u003c/div>\n    \u003cp>Bozze di circolari, avvisi, email e PEC · sintesi e lettura di note e circolari lunghe · traduzioni per le famiglie straniere · checklist e mini-guide procedurali (es. \"i passi per inserire un contratto su SIDI\") · spiegazioni e formazione interna. Studi di settore stimano fino al 60–70% di tempo risparmiato nella stesura di comunicazioni standard.\u003c/p>\u003c/div>\n    \u003cdiv class='ib dan'>\u003cdiv class='ibt'>⛔ Dove l'IA non entra\u003c/div>\n    \u003cp>Inserimento e gestione dei dati reali in SIDI/NoiPA/gestionali · assegnazione delle supplenze (algoritmo/procedura) · emissione di stipendi, mandati e fatture · protocollazione e conservazione ufficiale · qualunque trattamento di dati personali reali in tool pubblici.\u003c/p>\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class='norma'>\u003cspan class='norma-ico'>🖊️\u003c/span>\u003cdiv>\u003cdiv class='norma-t'>Principio guida\u003c/div>\u003cdiv class='norma-d'>La piattaforma fa l'atto; l'IA aiuta a scriverne e capirne il contorno. Firma e responsabilità restano umane (sorveglianza umana — AI Act art. 14; GDPR art. 22).\u003c/div>\u003c/div>\u003c/div>\n  "}],"quiz":[{"q":"Quale è il primo adempimento obbligatorio dopo aver generato una nota all'UST con l'IA?","opts":["Inviare subito la nota senza perdere tempo","Verificare tutti i riferimenti normativi su normattiva.it prima dell'invio","Chiedere conferma a un secondo strumento IA","Stampare una copia fisica per l'archivio"],"cor":1,"exp":"La L. 241/1990, art. 3, richiede che gli atti amministrativi citino correttamente le basi giuridiche. L'IA può inventare norme plausibili. La verifica su normattiva.it è obbligatoria — non facoltativa — prima di qualsiasi invio ufficiale."},{"q":"Quale normativa impone che i dati del PDP di un alunno con DSA siano trattati come dati sanitari?","opts":["Solo il GDPR art. 5 (principi del trattamento)","L. 170/2010 + DM 5669/2011 + GDPR art. 9 (categorie speciali)","DPR 275/1999 (autonomia scolastica)","D.Lgs. 82/2005 (CAD)"],"cor":1,"exp":"La L. 170/2010 impone riservatezza assoluta sui dati DSA. Il GDPR art. 9 classifica i dati sanitari come categorie speciali, vietandone il trattamento su piattaforme IA senza adeguate garanzie. I dati del PDP sono sanitari per entrambe le normative."},{"q":"Il PTOF secondo il DPR 275/1999 viene approvato da:","opts":["Solo il Dirigente Scolastico","Il Collegio dei Docenti","Il Consiglio di Istituto su proposta del Collegio dei Docenti","L'Ufficio Scolastico Territoriale"],"cor":2,"exp":"DPR 275/1999, art. 3: il PTOF è approvato dal Consiglio di Istituto su proposta del Collegio dei Docenti. L'IA accelera la stesura delle sezioni narrative, ma l'approvazione formale degli organi è insostituibile."},{"q":"Quale atto del personale NON deve mai essere delegato interamente all'IA?","opts":["Comunicazione di assegnazione supplenza","Convocazione per il Consiglio di Classe","Circolare interna su variazione orario","Atto disciplinare formale che richiede competenza giuridica"],"cor":3,"exp":"Il D.Lgs. 165/2001, art. 55-bis, disciplina gli atti disciplinari nel pubblico impiego con procedure precise. Richiedono competenza giuridica specifica — l'IA può produrre bozze, ma la revisione di un esperto è sempre necessaria prima della firma."},{"q":"Per la documentazione PNRR, quale adempimento NON può essere delegato all'IA?","opts":["Comunicare alle famiglie l'attivazione di un'attività","Descrivere il progetto per il sito web della scuola","Rendicontazione contabile e certificazioni di spesa","Strutturare la relazione narrativa del progetto"],"cor":2,"exp":"La rendicontazione contabile e le certificazioni di spesa richiedono precisione assoluta e responsabilità legale diretta. L'IA può sbagliare calcoli o interpretare le regole in modo errato. Questi adempimenti devono essere verificati e firmati manualmente da personale qualificato."},{"q":"Le convocazioni per le supplenze da graduatoria d'istituto si gestiscono…","opts":["scrivendole con ChatGPT","tramite SIDI (Reclutamento → Convocazioni)","su un gestionale di contabilità","via messaggio sui social"],"cor":1,"exp":"La segreteria invia la convocazione da SIDI; l'aspirante risponde tramite un link su Istanze OnLine."},{"q":"Qual è un uso APPROPRIATO dell'IA accanto a SIDI?","opts":["Caricare l'anagrafe alunni coi dati reali","Far assegnare la supplenza all'IA","Far redigere la bozza della comunicazione che accompagna la convocazione","Sostituire NoiPA per gli stipendi"],"cor":2,"exp":"L'IA aiuta a scrivere e spiegare ciò che gira attorno all'atto, non a compiere l'atto né a trattare dati reali."},{"q":"Stipendi e cedolini del personale scolastico sono gestiti da…","opts":["NoiPA","un modello linguistico","il registro elettronico","Pago In Rete"],"cor":0,"exp":"NoiPA gestisce lo stato giuridico-economico e i pagamenti del personale: l'IA non vi entra."}]},{"id":5,"title":"IA per i Docenti","icon":"👩‍🏫","time":"32 min","fo":"doc","obj":["Progettare UDA e materiali differenziati con l'IA","Creare rubriche di valutazione trasparenti","Produrre relazioni e documentazione nel rispetto della privacy","Usare l'IA per il proprio aggiornamento professionale"],"check":["Ho generato una UDA reale con l'IA per la mia materia","Ho creato una scheda differenziata a 3 livelli","Ho prodotto una rubrica di valutazione utilizzabile con la mia classe","So come scrivere relazioni rispettando il GDPR (dati anonimi)","Ho usato l'IA per sintetizzare un articolo di ricerca pedagogica"],"secs":[{"t":"Progettazione didattica: UDA e programmazioni","sl":{"prova":"ESERCIZIO UDA REALE: scegli un argomento che devi affrontare con una tua classe nelle prossime settimane. Usa il prompt RCOF per generare l'UDA completa. Leggi l'output: quanti elementi sono utilizzabili direttamente? Cosa devi personalizzare per la tua classe specifica? Calcola il tempo totale impiegato vs il tempo che avresti impiegato tradizionalmente.","rifl":"Quale parte della progettazione didattica ti prende più tempo? La struttura iniziale, la ricerca di risorse, o la differenziazione per BES/DSA? L'IA può aiutare su ciascuna di queste — con priorità diverse per ognuno di noi."},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — UDA completa con differenziazione\u003c/div>\u003cspan class='pb-role doc'>Docenti\u003c/span>\u003c/div>\u003cpre class='pt'>Sei un docente di [materia] scuola [tipo].\nProgetta UDA su [argomento] per classe [N].\nDurata: [N] settimane — [N] ore totali\nCompetenze (Raccomandazione UE 2018): [specificare]\n\nIncludi:\n1. Titolo accattivante\n2. Competenze chiave europee\n3. Obiettivi specifici (min. 4, con verbi di Bloom)\n4. Sequenza attività con tempi\n5. Metodologie (cooperative, flipped, debate...)\n6. Rubrica di valutazione (base: DM 62/2017)\n7. Personalizzazioni BES/DSA — SOLO GENERICHE\n   mai nomi reali (GDPR art. 9)\nBase: DM 254/2012 — Indicazioni Nazionali.\u003c/pre>\u003cdiv class='prl'>✨ Da 3-4 ore a 45-60 minuti\u003c/div>\u003cdiv class='prt'>La struttura di base è pronta in minuti. Il tempo risparmiato si investe nella personalizzazione per la propria classe e nella ricerca di risorse specifiche — le parti che fanno davvero la differenza.\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">DM 254/2012 — Decreto Ministeriale 16 novembre 2012\u003c/div>\u003cdiv class=\"norma-d\">Indicazioni Nazionali per il curricolo della scuola dell'infanzia e del primo ciclo. I docenti hanno autonomia nella progettazione didattica — l'IA supporta questa autonomia senza sostituire il giudizio professionale del docente.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Materiali differenziati e adattamenti BES/DSA","sl":{"prova":"Genera una scheda differenziata a 3 livelli su un argomento che stai affrontando in classe. Poi condividila (su carta o digitalmente) con 2-3 studenti che conosci bene e chiedi il loro feedback: il livello base è davvero accessibile per chi ha difficoltà? Il livello avanzato è stimolante? Il feedback degli studenti è il test più importante.","rifl":"Quante ore spendi ogni mese per creare materiali differenziati per alunni con BES/DSA? Come cambierebbe il tuo tempo se potessi generare le 3 versioni in 15 minuti invece di 2 ore?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Scheda a 3 livelli\u003c/div>\u003cspan class='pb-role doc'>Docenti\u003c/span>\u003c/div>\u003cpre class='pt'>Crea una scheda di lavoro su [argomento]\nper classe [N] con tre livelli:\n\nLIVELLO BASE (per alunni con difficoltà/BES):\n- Linguaggio semplificato, frasi brevi\n- Istruzioni passo-passo\n- Max 5 esercizi con supporto\n- Risposta multipla o completamento\n\nLIVELLO STANDARD:\n- 8-10 esercizi variati\n- Mix applicativo e riflessivo\n\nLIVELLO AVANZATO:\n- Problem solving, collegamento con altri saperi\n- Una sfida aperta (riflessione critica)\n\nStesso argomento, accessibilità calibrata.\u003c/pre>\u003cdiv class='prl'>✨ Principio di UDL (Universal Design for Learning)\u003c/div>\u003cdiv class='prt'>Tre versioni dello stesso materiale non sono 3 lavori separati: sono un unico progetto didattico che garantisce accesso equo a tutti gli studenti. Base: L. 170/2010 (DSA) e D.Lgs. 66/2017 (inclusione).\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">D.Lgs. 66/2017 — D.Lgs. 13 aprile 2017 n. 66\u003c/div>\u003cdiv class=\"norma-d\">Norme per la promozione dell'inclusione scolastica degli studenti con disabilità. La differenziazione dei materiali è uno strumento di inclusione — l'IA velocizza la produzione senza compromettere la qualità pedagogica.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Valutazione: rubriche efficaci e feedback personalizzato","sl":{"prova":"ESERCIZIO RUBRICA: genera una rubrica per la prossima prova che devi somministrare alla tua classe. Poi condividila con gli studenti PRIMA della prova (questo è già una rivoluzione pedagogica!) e chiedi: 'Sapete cosa fare per raggiungere il livello Avanzato?' Se rispondono di sì, la rubrica funziona.","rifl":"Condividi i criteri di valutazione con i tuoi studenti prima delle prove? In che modo la trasparenza dei criteri cambia il loro approccio allo studio? Hai evidenze di questa correlazione nella tua esperienza?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Rubrica analitica trasparente\u003c/div>\u003cspan class='pb-role doc'>Docenti\u003c/span>\u003c/div>\u003cpre class='pt'>Crea rubrica analitica per [tipo di prova].\nDisciplina: [materia] — Classe: [N]\nBase: DM 62/2017 (criteri valutazione)\n\n- 4-5 criteri SPECIFICI e OSSERVABILI\n- 4 livelli: Avanzato/Intermedio/Base/\n  In via di acquisizione\n- Descrittori MISURABILI per ogni cella\n  (NON 'sa la materia' → SÌ 'elenca 3 caratteristiche di...')\n- Corrispondenza con voti numerici 4-10\n- Comprensibile agli studenti PRIMA della prova\u003c/pre>\u003cdiv class='prl'>✨ Impatto pedagogico\u003c/div>\u003cdiv class='prt'>I descrittori specifici condivisi prima della prova aumentano la motivazione, riducono le contestazioni e rendono la valutazione trasparente ai genitori. La rubrica non sostituisce il giudizio del docente — lo rende esplicitamente comunicato.\u003c/div>\u003c/div>\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Feedback personalizzato\u003c/div>\u003cspan class='pb-role doc'>Docenti\u003c/span>\u003c/div>\u003cpre class='pt'>Scrivi feedback per uno studente:\nPunti di forza osservati: [specificare]\nAree da migliorare: [specificare]\nVoto: [N]/10\n\nIl feedback deve:\n- Riconoscere i punti di forza specificamente\n- Indicare chiaramente cosa migliorare\n- Suggerire 2-3 azioni concrete\n- Tono motivante e rispettoso\n- Max 100 parole\n- EVITARE frasi generiche\n  (no 'devi impegnarti di più')\u003c/pre>\u003cdiv class='prl'>✨ Risultato atteso\u003c/div>\u003cdiv class='prt'>Feedback costruttivo e motivante. Molto più efficace per la crescita degli studenti rispetto ai commenti generici. Cambia l'esperienza dell'errore: da giudizio a orientamento.\u003c/div>\u003c/div>"},{"t":"Relazioni, documentazione e aggiornamento professionale","sl":{"prova":"PROVA LA SINTESI: cerca su Google Scholar o ResearchGate un articolo di pedagogia o didattica disciplinare che ti interessa (anche in inglese). Copia l'abstract e incollalo nell'IA con questo prompt: 'Sei un docente di [materia]. Analizza questo abstract e dimmi: 1) 3 punti chiave 2) implicazioni pratiche per la mia classe 3) come potrei applicare questo nella mia prossima UDA.' Valuta l'utilità dell'output.","rifl":"Quante ore dedichi all'aggiornamento professionale ogni mese? Come ti aggiorni attualmente? L'IA potrebbe cambiare la qualità e la quantità del tuo aggiornamento riducendo il tempo necessario per sintetizzare la letteratura?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Relazione finale alunno (ANONIMA)\u003c/div>\u003cspan class='pb-role doc'>Docenti\u003c/span>\u003c/div>\u003cpre class='pt'>Relazione finale per [ALUNNO_X — usa sempre codice].\n⚠️ GDPR artt. 8-9: dati di minori + categorie speciali\nMAI inserire dati identificativi reali su IA pubblica.\n\nPunti di forza: [descrivere senza nomi]\nDifficoltà: [descrivere]\nProgressi: [descrivere]\nComportamento e socializzazione: [descrivere]\nSituazione in uscita: [descrivere]\n\n150-200 parole, tono obiettivo e pedagogico.\n→ Inserisci nome e dati reali SOLO nel file\n  finale, offline o su sistemi approvati dal DPO.\u003c/pre>\u003cdiv class='prl'>✨ Il flusso di lavoro sicuro\u003c/div>\u003cdiv class='prt'>1. Genera con dati anonimi → 2. Salva il testo → 3. Inserisci i dati reali nel documento finale OFFLINE → 4. Firma e archivia nel fascicolo. Conforme a GDPR artt. 8-9.\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">GDPR — Reg. UE 2016/679, artt. 8-9\u003c/div>\u003cdiv class=\"norma-d\">Art. 8: protezione rafforzata per dati dei minori (under 16 in Italia). Art. 9: categorie speciali (sanitari, condizione familiare) — vietato il trattamento su piattaforme senza DPA. Il flusso 'anonimizza prima, completa offline' è l'unico conforme per IA consumer.\u003c/div>\u003c/div>\u003c/div>"}],"quiz":[{"q":"Le UDA prodotte con l'IA devono essere basate su quale quadro normativo didattico?","opts":["Solo le indicazioni dell'IA stessa","DM 254/2012 (Indicazioni Nazionali) e Raccomandazione UE 2018 sulle competenze chiave","Esclusivamente le disposizioni del dirigente scolastico","L. 107/2015 (La Buona Scuola) esclusivamente"],"cor":1,"exp":"Le UDA devono essere coerenti con il DM 254/2012 (Indicazioni Nazionali per il curricolo) e con la Raccomandazione UE 2018 sulle competenze chiave. L'IA può costruire UDA coerenti con questo quadro se fornita degli elementi corretti nel prompt RCOF."},{"q":"Il D.Lgs. 66/2017 supporta quale pratica didattica che l'IA può facilitare?","opts":["La valutazione interamente automatizzata","La differenziazione dei materiali per l'inclusione di tutti gli studenti","L'esonero dalle verifiche per alunni BES","La separazione degli alunni con disabilità in classi dedicate"],"cor":1,"exp":"Il D.Lgs. 66/2017 promuove l'inclusione scolastica. La differenziazione dei materiali (schede a 3 livelli) è uno strumento fondamentale — l'IA accelera enormemente la produzione senza compromettere la qualità pedagogica."},{"q":"Il DM 62/2017 stabilisce che le rubriche di valutazione devono:","opts":["Essere tenute riservate fino alla consegna del compito","Essere coerenti con i criteri definiti dal Collegio e comunicati alle famiglie","Usare solo voti numerici senza descrizioni qualitative","Essere compilate dall'IA in modo automatico"],"cor":1,"exp":"Il DM 62/2017, art. 2, stabilisce che la valutazione è coerente con i criteri definiti dal Collegio dei Docenti e comunicati alle famiglie. Le rubriche condivise prima della prova rispettano questo principio e aumentano la trasparenza valutativa."},{"q":"Per le relazioni finali sugli alunni, il flusso corretto con l'IA è:","opts":["Inserire il nome completo nell'IA per massima accuratezza","Usare dati anonimi nell'IA, completare con dati reali OFFLINE nel documento finale","Pubblicare la relazione generata direttamente nel registro","Evitare completamente l'IA per qualsiasi documento su alunni"],"cor":1,"exp":"Il flusso corretto rispetta il GDPR artt. 8-9: dati anonimi/codici nell'IA → output generato → inserimento dei dati reali OFFLINE nel documento finale. Questo protegge la privacy senza rinunciare al supporto dell'IA."},{"q":"La formazione continua dei docenti sull'IA trova base normativa principalmente in:","opts":["Non ha ancora base normativa specifica","CCNL Istruzione 2019-2021 art. 63 + Piano Nazionale Scuola Digitale (L. 107/2015)","Solo nel GDPR art. 32 (sicurezza)","Esclusivamente nelle circolari ministeriali non vincolanti"],"cor":1,"exp":"Il CCNL Istruzione 2019-2021, art. 63, riconosce l'obbligo di formazione professionale continua. Il PNSD (L. 107/2015) include la formazione digitale come priorità sistemica. Insieme, forniscono la base per inserire la formazione IA nel Piano di Formazione d'Istituto."}]},{"id":6,"title":"Strumenti Pratici","icon":"🛠️","time":"20 min","fo":"all","obj":["Usare ChatGPT, Claude e Copilot con sicurezza","Costruire il proprio workflow personale in 5 passi","Evitare i 5 errori più costosi","Ottimizzare il tempo di lavoro dall'inizio"],"check":["Ho completato il mio workflow personale scritto per il task più frequente","Conosco e so evitare i 5 errori principali","So quando usare Copilot/Gemini vs ChatGPT/Claude","Ho impostato il contesto personalizzato nel mio strumento preferito","Ho salvato almeno 3 template riutilizzabili"],"secs":[{"t":"Guida pratica ai 4 strumenti principali","sl":{"prova":"TEST COMPARATIVO: scegli una circolare o un'email tipo che devi redigere. Generala con due strumenti diversi (es. ChatGPT e Claude, oppure Copilot in Word e Claude). Confronta: quale output ti è sembrato più professionale? Quale richiedeva meno correzioni? Quale si integra meglio nel tuo flusso di lavoro? Segna il tuo strumento preferito e perché.","rifl":"Il tuo strumento preferito ha un DPA incluso per la tua scuola? Se no, sai cosa significa per i dati che puoi inserirvi? (Risposta: solo dati anonimi, vedi Modulo 7.)"},"h":"\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Strumento\u003c/th>\u003cth>Meglio per\u003c/th>\u003cth>DPA scuole\u003c/th>\u003cth>Accesso\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>Copilot (Word/Outlook)\u003c/strong>\u003c/td>\u003ctd>Chi usa M365 — nessun copia/incolla\u003c/td>\u003ctd>✅ M365 Education\u003c/td>\u003ctd>Già incluso se hai M365\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Gemini (Docs/Gmail)\u003c/strong>\u003c/td>\u003ctd>Chi usa Google Workspace\u003c/td>\u003ctd>✅ Workspace Education\u003c/td>\u003ctd>Già incluso in GWS\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>ChatGPT\u003c/strong>\u003c/td>\u003ctd>Task generali, versatilità massima\u003c/td>\u003ctd>❌ consumer\u003c/td>\u003ctd>chat.openai.com — gratuito\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Claude\u003c/strong>\u003c/td>\u003ctd>Testi lunghi, stile formale, PTOF/RAV\u003c/td>\u003ctd>❌ consumer\u003c/td>\u003ctd>claude.ai — gratuito\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003cdiv class='ib tea'>\u003cdiv class='ibt'>Istruzione personalizzata — risparmia tempo ogni giorno\u003c/div>\u003cp>In ChatGPT (Impostazioni → Istruzioni personalizzate) scrivi: \u003cem>'Sono la segretaria/il docente di [ruolo] dell'IC [nome] di [città]. Usa sempre il tono formale delle scuole italiane. Considera sempre il contesto della scuola pubblica italiana.'\u003c/em> Questo contesto viene applicato automaticamente a ogni conversazione.\u003c/p>\u003c/div>"},{"t":"Il workflow in 5 passi e gli errori da evitare","sl":{"prova":"COSTRUISCI IL TUO WORKFLOW PERSONALE: scrivi su carta (o in un documento) il tuo workflow completo per il task che fai più spesso (es. circolare colloqui). Includere: 1) Dati che preparo → 2) Prompt RCOF che uso → 3) Revisione specifica che faccio → 4) Checklist prima della pubblicazione → 5) Dove salvo il template. Questo documento vale ore.","rifl":"Qual è l'errore che temi di più nell'uso dell'IA al lavoro? Come lo preveniresti con il tuo workflow? Il workflow scritto è la risposta a quasi tutti i rischi."},"h":"\u003cdiv class='steps'>\u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Prepara i dati PRIMA di aprire l'IA\u003c/div>\u003cdiv class='step-p'>Date, nomi, numeri, normative. 2 minuti investiti qui risparmiano 10 di correzione. L'IA lavora meglio con informazioni complete.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Scrivi il prompt RCOF\u003c/div>\u003cdiv class='step-p'>Ruolo + Compito + Contesto + Formato. Includi un esempio se disponibile. Sii preciso sui requisiti formali (DPR 445/2000).\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Valuta e chiedi revisioni specifiche\u003c/div>\u003cdiv class='step-p'>L'IA mantiene il contesto nella stessa sessione. 'Rendi più formale il secondo paragrafo' è più efficiente che ricominciare da zero.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>4\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Verifica i dati fattuali (OBBLIGATORIO)\u003c/div>\u003cdiv class='step-p'>Date, nomi, protocollo, normative. Obbligatorio per atti ufficiali: DPR 445/2000 e L. 241/1990. Non facoltativo.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>5\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Salva come template riutilizzabile\u003c/div>\u003cdiv class='step-p'>Ogni template salvato è un investimento. Dalla seconda volta il lavoro richiede 3 minuti invece di 10.\u003c/div>\u003c/div>\u003c/div>\u003c/div>\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Errore\u003c/th>\u003cth>Conseguenza\u003c/th>\u003cth>Soluzione\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Prompt vago\u003c/td>\u003ctd>Output generico inutilizzabile\u003c/td>\u003ctd>Formula RCOF con dati completi\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pubblicare senza verificare\u003c/td>\u003ctd>Errori in atti ufficiali, responsabilità\u003c/td>\u003ctd>Checklist fissa: date · nomi · protocollo · normative\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Ricominciare da capo\u003c/td>\u003ctd>Perde tempo e contesto\u003c/td>\u003ctd>Revisioni specifiche nella stessa sessione\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dati sensibili reali\u003c/td>\u003ctd>Violazione GDPR art. 9\u003c/td>\u003ctd>Anonimizza sempre prima di inserire\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Normative non verificate\u003c/td>\u003ctd>Atti impugnabili, responsabilità disciplinare\u003c/td>\u003ctd>normattiva.it per ogni riferimento\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"}],"quiz":[{"q":"Quale strumento ha il DPA incluso per le scuole con contratto Microsoft 365 Education?","opts":["ChatGPT (versione gratuita)","Claude (versione consumer)","Microsoft Copilot in M365 Education","Google Translate web gratuito"],"cor":2,"exp":"Microsoft Copilot in M365 Education include un DPA nel contratto educativo: dati non usati per addestrare il modello, storage conforme GDPR EU. Questo lo rende il punto di partenza più sicuro per le scuole con M365."},{"q":"Perché la verifica dei dati fattuali nel workflow è OBBLIGATORIA e non facoltativa?","opts":["Per evitare che l'IA si aggiorni automaticamente","Perché DPR 445/2000 e L. 241/1990 richiedono correttezza di date, protocollo e motivazioni giuridiche negli atti PA","Per motivi estetici di presentazione del documento","Perché l'IA non capisce le date italiane"],"cor":1,"exp":"Il DPR 445/2000 e la L. 241/1990 stabiliscono i requisiti formali e di motivazione degli atti amministrativi. Questi obblighi si applicano indipendentemente dallo strumento usato per produrre il testo — la responsabilità è sempre del firmatario."},{"q":"Se l'output dell'IA non è soddisfacente, la strategia più efficiente è:","opts":["Ricominciare da capo con un nuovo prompt","Cambiare strumento IA immediatamente","Chiedere revisioni specifiche nella stessa sessione","Accettare il risultato per risparmiare tempo"],"cor":2,"exp":"L'IA mantiene il contesto nella stessa sessione. Chiedere 'rendi il secondo paragrafo più formale' o 'aggiungi una sezione su X' è molto più efficiente che ricominciare con tutte le informazioni iniziali."},{"q":"Le 'istruzioni personalizzate' in ChatGPT servono a:","opts":["Cambiare il modello IA utilizzato","Impostare il contesto della propria scuola per tutte le conversazioni future","Accedere a funzioni premium senza abbonamento","Memorizzare password e credenziali scolastiche"],"cor":1,"exp":"Le istruzioni personalizzate (Impostazioni → Istruzioni personalizzate) permettono di impostare una volta il contesto fisso (ruolo, scuola, stile) che viene applicato automaticamente a tutte le conversazioni. Elimina la necessità di ripetere il contesto ogni volta."}]},{"id":7,"title":"Privacy, Etica e GDPR","icon":"🔒","time":"22 min","fo":"all","obj":["Applicare il GDPR all'uso quotidiano dell'IA scolastica","Saper anonimizzare i dati prima di usare l'IA","Conoscere la responsabilità del titolare del trattamento","Costruire un comportamento etico e conforme nella propria pratica"],"check":["Conosco la differenza tra dati comuni e categorie speciali (GDPR art. 9)","So anonimizzare correttamente i dati prima di inserirli nell'IA","Conosco gli obblighi del titolare del trattamento e del DPO","Conosco i 5 principi etici per l'uso dell'IA nella scuola","So costruire il mio comportamento quotidiano conforme al GDPR"],"secs":[{"t":"GDPR e dati scolastici: le regole pratiche","sl":{"prova":"AUDIT PERSONALE: fai questo test ora. Apri il tuo strumento IA preferito e guarda le ultime 3-5 conversazioni. Ci sono dati personali reali (nomi di alunni, famiglie, diagnosi)? Se sì: quelle conversazioni andrebbero eliminate dalle impostazioni dello strumento. Se no: complimenti, sei già sulla strada giusta. Annota cosa hai trovato.","rifl":"Nella tua scuola, c'è qualcuno che sa esattamente quali strumenti IA vengono usati con dati personali? Il DPO ne è informato? Questa mappatura è il primo passo verso la compliance GDPR."},"h":"\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Tipo di dati\u003c/th>\u003cth>Esempi\u003c/th>\u003cth>Livello\u003c/th>\u003cth>Con IA consumer\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Dati comuni\u003c/td>\u003ctd>Nome, email, indirizzo\u003c/td>\u003ctd>Standard\u003c/td>\u003ctd>Solo con DPA\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Categorie speciali (art. 9)\u003c/td>\u003ctd>Sanitari, disabilità, DSA, etnia, religione\u003c/td>\u003ctd>Rafforzata\u003c/td>\u003ctd>❌ Vietato\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dati di minori (art. 8)\u003c/td>\u003ctd>Qualsiasi dato di alunni under 16\u003c/td>\u003ctd>Massima\u003c/td>\u003ctd>❌ Solo sistemi con DPA specifico\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dati giudiziari\u003c/td>\u003ctd>Procedimenti, sanzioni disciplinari\u003c/td>\u003ctd>Speciale\u003c/td>\u003ctd>❌ Assolutamente vietato\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">GDPR — Reg. UE 2016/679, artt. 4(7-8), 8, 9, 28\u003c/div>\u003cdiv class=\"norma-d\">Art. 4(7): titolare del trattamento = la scuola/DS. Art. 4(8): responsabile = fornitore IA. Art. 8: protezione rafforzata minori under 16. Art. 9: categorie speciali — sanitari, etnia, religione: trattamento vietato senza base giuridica e misure adeguate. Art. 28: DPA obbligatorio.\u003c/div>\u003c/div>\u003c/div>"},{"t":"La tecnica di anonimizzazione e il flusso sicuro","sl":{"prova":"ESERCIZIO PRATICO DI ANONIMIZZAZIONE: prendi un testo reale che hai scritto recentemente (relazione su un alunno, PDP, email su situazione familiare). Applica le 4 regole di anonimizzazione, poi inseriscilo nell'IA. Confronta: il risultato è ugualmente utile? Quanto tempo ha richiesto l'anonimizzazione? (Di solito: 2-3 minuti per proteggere dati che valgono anni di sanzioni.)","rifl":"Nella tua pratica quotidiana, in quali situazioni hai più difficoltà ad anonimizzare i dati? Come potresti creare un 'template di anonimizzazione' standard per le tipologie più frequenti?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 TECNICA — Anonimizzazione in 4 passi\u003c/div>\u003cspan class='pb-role all'>Tutti\u003c/span>\u003c/div>\u003cpre class='pt'>Prima di inserire testo nell'IA:\n\nPASSO 1: Sostituisci nomi con codici\n  'Mario Rossi, 3B' → 'ALUNNO_X, Classe_3'\n\nPASSO 2: Rimuovi dati identificativi precisi\n  'nato il 15/03/2013' → 'alunno di 12 anni'\n\nPASSO 3: Generalizza le diagnosi\n  Usa 'disturbo della lettura' non la diagnosi\n  clinica specifica con codice ICD\n\nPASSO 4: Completa con dati reali OFFLINE\n  Dopo la generazione, inserisci nome e dati\n  reali solo nel file finale sul tuo computer.\u003c/pre>\u003cdiv class='prl'>✨ Tempo richiesto\u003c/div>\u003cdiv class='prt'>2-3 minuti per anonimizzare completamente. Questo tempo protegge dal rischio di sanzioni GDPR fino a €20 milioni. Il calcolo costo/beneficio è ovvio.\u003c/div>\u003c/div>"},{"t":"I 5 principi etici e la responsabilità professionale","sl":{"prova":"CREA LA TUA POLICY PERSONALE: sulla base dei 5 principi etici, scrivi 5 regole personali sull'uso dell'IA nel tuo lavoro. Esempio: '1. Non inserisco mai dati reali di alunni in strumenti senza DPA. 2. Verifico sempre le normative citate prima di firmare.' Condividila con un collega e discutila. Poi proponila come base per la policy d'istituto.","rifl":"Se dovessi spiegare ai tuoi colleghi perché usare l'IA in modo responsabile è nell'interesse di tutti — non solo per la compliance — quale argomento useresti? Quale resistenza ti aspetti e come la risponderesti?"},"h":"\u003cdiv class='hb'>\u003cdiv class='hbt'>⭐ I 5 principi etici fondamentali\u003c/div>\u003cdiv class='hbc'>1. TRASPARENZA — comunicare quando l'IA è usata per produrre documenti ufficiali (AI Act art. 50)\n2. SUPERVISIONE — nessun documento pubblicato senza revisione umana qualificata (AI Act art. 14)\n3. PRIVACY — no dati sensibili su IA senza DPA (GDPR art. 28)\n4. EQUITÀ — la formazione è per tutti, non solo per i tecnologici (CCNL art. 63)\n5. RESPONSABILITÀ — il firmatario è sempre responsabile del contenuto (L. 241/1990 art. 3)\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">AI Act + GDPR — Reg. UE 2024/1689, art. 14 + Reg. UE 2016/679, art. 22\u003c/div>\u003cdiv class=\"norma-d\">AI Act art. 14: supervisione umana obbligatoria per sistemi ad alto rischio. GDPR art. 22: divieto di decisioni interamente automatizzate con effetti giuridici. Insieme definiscono il 'human in the loop': l'IA supporta, l'umano decide e si assume la responsabilità.\u003c/div>\u003c/div>\u003c/div>"}],"quiz":[{"q":"Il GDPR art. 9 classifica come 'categorie speciali' i dati:","opts":["Solo i dati bancari e finanziari","Sanitari, disabilità, DSA, etnia, religione, dati giudiziari","Qualsiasi dato di un alunno minore","Solo le diagnosi mediche formali"],"cor":1,"exp":"GDPR art. 9: le categorie speciali includono dati sanitari, disabilità, DSA, origine etnica, convinzioni religiose, opinioni politiche, dati giudiziari. Richiedono base giuridica esplicita e misure di sicurezza rafforzate — il trattamento su IA consumer è vietato."},{"q":"Il flusso di lavoro corretto per usare l'IA su relazioni scolastiche è:","opts":["Inserire tutti i dati reali per massima accuratezza dell'output","Dati anonimi nell'IA → output generato → dati reali nel documento finale OFFLINE","Pubblicare direttamente l'output dell'IA nel registro elettronico","Chiedere il consenso dei genitori prima di usare l'IA per ogni relazione"],"cor":1,"exp":"Il flusso corretto: dati anonimi/codici nell'IA → testo generato → inserimento dati reali OFFLINE nel documento finale. Questo rispetta GDPR artt. 8-9 proteggendo minori e categorie speciali, senza rinunciare al supporto dell'IA."},{"q":"Chi è il 'titolare del trattamento' in una scuola italiana?","opts":["Il DPO (Data Protection Officer)","Il singolo docente che usa l'IA","La scuola come istituzione, rappresentata dal Dirigente Scolastico","Il fornitore dello strumento IA"],"cor":2,"exp":"GDPR art. 4(7): il titolare del trattamento è chi determina finalità e mezzi del trattamento. In una scuola è l'istituzione scolastica/DS. Il fornitore IA è il 'responsabile del trattamento' (art. 4(8)) e deve avere un DPA."},{"q":"Il principio 'human in the loop' si basa normativamente su:","opts":["Solo sulla deontologia professionale informale","AI Act art. 14 (supervisione umana) + GDPR art. 22 (no decisioni interamente automatizzate)","D.Lgs. 82/2005 (CAD) esclusivamente","Solo sul CCNL del personale scolastico"],"cor":1,"exp":"Il 'human in the loop' ha doppia base normativa: AI Act art. 14 impone supervisione umana per sistemi ad alto rischio, GDPR art. 22 vieta decisioni interamente automatizzate con effetti giuridici. L'IA supporta, l'umano decide."},{"q":"La policy IA d'istituto deliberata dal CdI si fonda su:","opts":["Solo il GDPR europeo","DPR 275/1999 (autonomia) + GDPR art. 24 + AI Act art. 50 + D.Lgs. 82/2005 (CAD)","Esclusivamente le circolari ministeriali","Solo l'AI Act come norma prevalente"],"cor":1,"exp":"La policy ha fondamento plurinormativo: DPR 275/1999 conferisce autonomia organizzativa, GDPR art. 24 impone misure tecniche adeguate, AI Act art. 50 richiede trasparenza, D.Lgs. 82/2005 promuove strumenti digitali PA. Nessuna norma è sufficiente da sola."}]},{"id":8,"title":"Test Finale","icon":"🏆","time":"22 min","fo":"all","final":true,"quiz":[{"q":"La formula RCOF per i prompt significa:","opts":["Risultato, Controllo, Output, Feedback","Ruolo, Compito, Contesto, Formato","Revisione, Correzione, Ottimizzazione, Fine","Risposta, Circolare, Oggetto, Firma"],"cor":1,"exp":"RCOF = Ruolo + Compito + Contesto + Formato. Questa struttura produce output professionali riducendo drasticamente i tempi di correzione."},{"q":"L'AI Act classifica come 'alto rischio' l'IA usata per:","opts":["Redigere circolari","Tradurre comunicazioni","Valutare studenti o determinare l'accesso all'istruzione","Produrre verbali di riunione"],"cor":2,"exp":"AI Act (Reg. UE 2024/1689), art. 6 e Allegato III: sistemi IA per valutare studenti = alto rischio. Richiedono supervisione umana, documentazione e trasparenza."},{"q":"Il GDPR art. 28 impone di stipulare un DPA con il fornitore IA:","opts":["Solo per dati sanitari","Solo per dati di minori","Per qualsiasi trattamento di dati personali per conto della scuola","Solo se il fornitore è straniero"],"cor":2,"exp":"GDPR art. 28: qualsiasi responsabile del trattamento che elabora dati personali per conto della scuola deve avere un DPA. Vale per tutti i dati personali."},{"q":"I dati del PDP di un alunno con DSA inseriti in ChatGPT consumer sono:","opts":["Legali con consenso del genitore","Una violazione del GDPR art. 9 (categorie speciali)","Consentiti se il documento è anonimizzato dopo","Legali se usati solo per generare la bozza"],"cor":1,"exp":"I dati del PDP sono sanitari (categorie speciali GDPR art. 9). Inserirli in piattaforme senza DPA è violazione del GDPR — il consenso non è la base giuridica applicabile in questo contesto."},{"q":"Chi è responsabile se una circolare con dati errati generati dall'IA viene firmata e pubblicata?","opts":["Il fornitore dello strumento IA","Il personale che ha generato il testo","Il Dirigente Scolastico o chi ha firmato","Responsabilità condivisa 50/50"],"cor":2,"exp":"Il firmatario è sempre responsabile: L. 241/1990 art. 3 e D.Lgs. 165/2001 art. 55-bis. L'IA non ha responsabilità giuridica — è uno strumento."},{"q":"La verifica dei riferimenti normativi generati dall'IA si effettua su:","opts":["Wikipedia o un altro sito informativo","normattiva.it per le leggi, istruzione.it per le circolari MIUR","Un secondo strumento IA per conferma","Il chatbot del Garante Privacy"],"cor":1,"exp":"normattiva.it è l'archivio ufficiale delle leggi italiane. istruzione.it per le circolari MIUR. Solo questi garantiscono l'autenticità del testo normativo citato in documenti ufficiali."},{"q":"Il DPR 445/2000 stabilisce che le circolari scolastiche devono avere:","opts":["Almeno 200 parole di contenuto","Data, numero di protocollo e firma del responsabile","Approvazione dell'UST prima della pubblicazione","Intestazione in almeno due lingue"],"cor":1,"exp":"DPR 445/2000 (T.U. Documentazione Amministrativa), art. 3: requisiti formali degli atti PA. Data, protocollo e firma del responsabile sono obbligatori — l'IA produce la bozza, l'umano verifica e firma."},{"q":"Per usare l'IA su documentazione BES/DSA in modo conforme al GDPR, il flusso corretto è:","opts":["Inserire dati reali per massima accuratezza","Dati anonimi nell'IA → output → dati reali nel documento finale OFFLINE","Usare l'IA solo per la correzione ortografica","Evitare completamente l'IA per qualsiasi documento BES"],"cor":1,"exp":"Il flusso: dati anonimi nell'IA → output → dati reali nel documento OFFLINE. Rispetta GDPR artt. 8-9 proteggendo minori e categorie speciali senza rinunciare al supporto dell'IA."},{"q":"Il PTOF secondo DPR 275/1999 viene approvato da:","opts":["Solo il DS","Il Collegio dei Docenti","Il CdI su proposta del Collegio","L'UST territoriale"],"cor":2,"exp":"DPR 275/1999, art. 3: il PTOF è approvato dal Consiglio di Istituto su proposta del Collegio. L'IA accelera la stesura — l'approvazione degli organi collegiali è insostituibile."},{"q":"La responsabilità disciplinare del dipendente pubblico per atti irregolari è sancita da:","opts":["GDPR art. 82","D.Lgs. 165/2001 art. 55-bis","AI Act art. 14","L. 241/1990 art. 7"],"cor":1,"exp":"D.Lgs. 165/2001, art. 55-bis: responsabilità disciplinare del dipendente per atti irregolari. L'uso dell'IA non è un'esimente — chi firma è responsabile del contenuto."},{"q":"Il PNSD (Piano Nazionale Scuola Digitale) è istituito da:","opts":["D.Lgs. 196/2003","DPR 275/1999","L. 107/2015 art. 1 cc. 56-57","AI Act art. 6"],"cor":2,"exp":"La L. 107/2015 (La Buona Scuola), art. 1 cc. 56-57, istituisce il PNSD che include l'obbligo di alfabetizzazione digitale per tutto il personale scolastico — inclusa la formazione sull'IA."},{"q":"Quale strumento ha il DPA incluso nel contratto per le scuole con Google Workspace for Education?","opts":["ChatGPT (versione gratuita)","Claude (versione consumer)","Google Gemini in Workspace for Education","Microsoft Copilot senza contratto M365"],"cor":2,"exp":"Google Gemini in Google Workspace for Education include garanzie GDPR nel contratto educativo (no riuso dati per addestramento, storage EU). È il punto di partenza più sicuro per le scuole che usano Google Workspace."},{"q":"Il principio 'human in the loop' in ambito scolastico si basa su:","opts":["Deontologia professionale informale","AI Act art. 14 + GDPR art. 22","D.Lgs. 82/2005 (CAD) esclusivamente","Solo il CCNL del personale"],"cor":1,"exp":"AI Act art. 14: supervisione umana obbligatoria per sistemi ad alto rischio. GDPR art. 22: divieto di decisioni interamente automatizzate con effetti giuridici. Insieme: l'IA supporta, l'umano decide."},{"q":"La tecnica di anonimizzazione in 4 passi (sostituisci → rimuovi → generalizza → completa offline) protegge da:","opts":["Errori ortografici nei documenti","Violazioni del GDPR artt. 8-9 per dati di minori e categorie speciali","Allucinazioni dell'IA sui dati inseriti","Errori di formato nelle circolari"],"cor":1,"exp":"L'anonimizzazione protegge dal trattamento illecito di categorie speciali (GDPR art. 9) e dati di minori (art. 8) su piattaforme IA senza DPA. Il processo richiede 2-3 minuti ma protegge da sanzioni che possono arrivare a €20 milioni."},{"q":"La formazione del personale scolastico sull'IA trova base normativa in:","opts":["Nessuna norma specifica — è solo buona prassi","CCNL Istruzione 2019-2021 artt. 22 e 63 + PNSD (L. 107/2015)","Solo nel GDPR art. 32","Esclusivamente nell'AI Act"],"cor":1,"exp":"Il CCNL Istruzione 2019-2021 (artt. 22 e 63) riconosce il diritto-dovere di formazione professionale. Il PNSD (L. 107/2015) include la formazione digitale come priorità sistemica. Insieme fondano l'obbligo di inserire la formazione IA nel Piano di Formazione d'Istituto."},{"q":"La policy IA dell'istituto deliberata in CdI si basa su:","opts":["Solo il GDPR europeo","DPR 275/1999 + GDPR art. 24 + AI Act + D.Lgs. 82/2005","Solo le circolari MIUR","Esclusivamente l'AI Act come norma prevalente"],"cor":1,"exp":"La policy ha fondamento plurinormativo: DPR 275/1999 (autonomia), GDPR art. 24 (misure organizzative), AI Act (trasparenza e rischio), D.Lgs. 82/2005 (digitalizzazione PA). La delibera del CdI esercita formalmente questa autonomia normativa."},{"q":"L'uso dell'IA per redigere circolari scolastiche è classificato dall'AI Act come:","opts":["Alto rischio — obblighi specifici","Inaccettabile — vietato","Rischio minimo — buone pratiche, nessun obbligo specifico","Rischio limitato — obbligo di dichiarare l'uso dell'IA"],"cor":2,"exp":"La redazione di circolari e documentazione amministrativa = rischio minimo (AI Act). Non richiede adempimenti specifici, ma le buone pratiche di trasparenza, revisione umana e privacy si applicano sempre."},{"q":"Il provvedimento del Garante Privacy del 30 marzo 2023 ha disposto:","opts":["L'approvazione di ChatGPT per tutte le scuole italiane","Il blocco temporaneo di ChatGPT in Italia per violazione del GDPR","Una multa di 1 miliardo a OpenAI","Il divieto permanente dell'IA nelle scuole"],"cor":1,"exp":"Il Garante ha disposto il blocco temporaneo di ChatGPT per: assenza di base giuridica, nessuna informativa agli utenti, mancanza di protezioni per i minori. ChatGPT è stato ripristinato dopo adeguamenti di OpenAI nell'aprile 2024."},{"q":"Il DM 62/2017 impone che la valutazione scolastica sia:","opts":["Esclusivamente numerica","Coerente con criteri definiti dal Collegio e comunicati alle famiglie","Delegabile a sistemi automatizzati per obiettività","Gestita autonomamente da ogni docente senza criteri condivisi"],"cor":1,"exp":"DM 62/2017, art. 2: la valutazione è coerente con i criteri definiti dal Collegio dei Docenti e comunicati alle famiglie. Le rubriche generate con l'IA devono essere coerenti con questi criteri approvati collegialmente."},{"q":"Il quadro normativo completo per l'uso dell'IA in una segreteria scolastica italiana include:","opts":["Solo il GDPR — non ci sono norme italiane","AI Act + GDPR + D.Lgs. 196/2003 + DPR 445/2000 + L. 241/1990 + DPR 275/1999 + normativa specifica","Solo le circolari MIUR non vincolanti","Esclusivamente l'AI Act come norma UE prevalente"],"cor":1,"exp":"Il quadro è plurilivello: AI Act (rischio), GDPR + D.Lgs. 196/2003 (privacy), DPR 445/2000 + L. 241/1990 (documentazione PA), DPR 275/1999 (autonomia), più L. 170/2010 e L. 104/1992 per BES/DSA. Nessuna norma è sufficiente da sola."}]},{"id":9,"title":"Libreria Prompt","icon":"📚","fo":"all","library":true},{"id":10,"title":"Glossario e Norme","icon":"📖","fo":"all","glossary":true},{"id":11,"title":"Risorse Utili","icon":"🔗","fo":"all","resources":true},{"id":21,"fo":"doc","icon":"⚖️","time":"20 min","title":"IA in classe: rischi e uso responsabile","obj":["Adottare un approccio prudenziale e graduale, a basso rischio educativo e giuridico","Distinguere gli usi a basso rischio da quelli ad alto rischio secondo l'AI Act","Sapere cosa non delegare mai all'IA e applicare la sorveglianza umana"],"check":["So riconoscere un uso 'ad alto rischio' vietato o da valutare con DPIA/FRIA","Non delego all'IA la valutazione degli apprendimenti","Uso l'IA come supporto, mantenendo centrale la relazione educativa"],"secs":[{"t":"Un approccio prudenziale e graduale","sl":{"prova":"Scegli una sola attività didattica a basso rischio (es. generare esercizi di ripasso) da sperimentare per due settimane, definendo come verificherai i risultati."},"h":"\u003cp class='lp'>L'IA è già entrata nella scuola e sta trasformando didattica, valutazione, organizzazione e amministrazione. Le Linee guida MIM invitano a un'introduzione \u003cstrong>graduale e prudenziale\u003c/strong>: partire da pratiche a \u003cstrong>basso rischio educativo e giuridico\u003c/strong>, sperimentare, monitorare e poi estendere.\u003c/p>\n      \u003cdiv class='ib suc'>\u003cdiv class='ibt'>A cosa finalizzare l'IA in didattica\u003c/div>\u003cp>Sostenere lo sviluppo cognitivo e la \u003cstrong>crescita critica\u003c/strong> degli studenti, migliorare i processi di \u003cstrong>inclusione\u003c/strong>, rafforzare competenze disciplinari e trasversali — senza sostituire impegno, riflessione e autonomia.\u003c/p>\u003c/div>\n      \u003cp class='lp'>Il principio di \u003cstrong>innovazione etica e responsabile\u003c/strong> chiede che la tecnologia potenzi l'apprendimento, non che lo rimpiazzi: l'IA è un assistente, la regia resta del docente.\u003c/p>"},{"t":"Cosa è «alto rischio» a scuola (AI Act)","sl":{"rifl":"Tra gli strumenti che usi o valuti, qualcuno rientra negli usi 'ad alto rischio'? In tal caso la scuola deve fare DPIA e FRIA."},"h":"\u003cp class='lp'>L'AI Act classifica \u003cstrong>ad alto rischio\u003c/strong> i sistemi di IA usati in istruzione per:\u003c/p>\n      \u003cdiv class='steps'>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Accesso e ammissione\u003c/div>\u003cdiv class='step-p'>Determinare l'accesso, l'ammissione o l'assegnazione di studenti a istituti o percorsi.\u003c/div>\u003c/div>\u003c/div>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Valutazione degli apprendimenti\u003c/div>\u003cdiv class='step-p'>Valutare i risultati o il livello di istruzione adeguato a una persona.\u003c/div>\u003c/div>\u003c/div>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Sorveglianza nelle prove\u003c/div>\u003cdiv class='step-p'>Monitorare e rilevare comportamenti vietati degli studenti durante gli esami.\u003c/div>\u003c/div>\u003c/div>\n      \u003c/div>\n      \u003cdiv class='ib dan'>\u003cdiv class='ibt'>⛔ Vietato a scuola\u003c/div>\u003cp>L'art. 5 dell'AI Act vieta tecniche manipolative, social scoring, categorizzazione biometrica e — in ambito educativo — i sistemi di \u003cstrong>riconoscimento delle emozioni\u003c/strong> (sentiment analysis), salvo motivi medici o di sicurezza.\u003c/p>\u003c/div>\n      \u003cdiv class='norma'>\u003cspan class='norma-ico'>⚠️\u003c/span>\u003cdiv>\u003cdiv class='norma-t'>Conseguenza pratica\u003c/div>\u003cdiv class='norma-d'>La \u003cstrong>valutazione\u003c/strong> non si delega all'IA: l'IA può aiutare a costruire una rubrica o a dare feedback formativo, ma il voto e la decisione restano del docente. Per i sistemi ad alto rischio servono DPIA e FRIA e una piena sorveglianza umana.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Sistemi ibridi e sorveglianza umana","sl":{"prova":"Riscrivi una tua consegna prevedendo un passaggio fatto con l'IA e un passaggio di confronto/discussione in classe senza IA."},"h":"\u003cp class='lp'>Le Linee guida raccomandano \u003cstrong>sistemi ibridi\u003c/strong>: automatizzare le attività ripetitive lasciando al docente le decisioni e la relazione diretta con gli studenti. L'IA non deve sostituire l'interazione umana e l'insegnamento, ma arricchire le metodologie.\u003c/p>\n      \u003cdiv class='g2'>\n        \u003cdiv class='mc'>\u003cdiv class='mct'>🤝 Interazione sociale\u003c/div>\u003cdiv class='mcp'>Alternare l'uso dell'IA a momenti di lavoro di gruppo e discussione, per contrastare isolamento e dipendenza.\u003c/div>\u003c/div>\n        \u003cdiv class='mc'>\u003cdiv class='mct'>👁️ Sorveglianza umana\u003c/div>\u003cdiv class='mcp'>Controllare gli output, individuare errori e bias, intervenire: la responsabilità resta umana.\u003c/div>\u003c/div>\n      \u003c/div>"}],"quiz":[{"q":"Quale approccio raccomandano le Linee guida MIM per introdurre l'IA in didattica?","opts":["Adozione immediata e generalizzata","Prudenziale e graduale, partendo da pratiche a basso rischio","Solo per le scuole superiori","Vietarla del tutto"],"cor":1,"exp":"Si parte da usi a basso rischio educativo e giuridico, con sperimentazione e monitoraggio."},{"q":"La valutazione degli apprendimenti tramite IA è considerata dall'AI Act…","opts":["un uso a rischio minimo","un uso ad alto rischio","sempre vietata","obbligatoria"],"cor":1,"exp":"È ad alto rischio: richiede DPIA/FRIA e non va comunque delegata; il voto resta del docente."},{"q":"A scuola, quale uso dell'IA è espressamente vietato dall'AI Act?","opts":["Generare esercizi di ripasso","Riconoscere le emozioni degli studenti (sentiment analysis)","Tradurre una consegna","Creare una mappa concettuale"],"cor":1,"exp":"Il riconoscimento delle emozioni in ambito educativo è vietato, salvo motivi medici o di sicurezza."},{"q":"Cosa intendono le Linee guida per «sistemi ibridi»?","opts":["Usare due chatbot insieme","Automatizzare il ripetitivo lasciando al docente decisioni e relazione","Sostituire il docente con l'IA","Vietare il lavoro di gruppo"],"cor":1,"exp":"L'IA arricchisce, non sostituisce l'insegnamento diretto e l'interazione umana."}]},{"id":22,"fo":"doc","icon":"♿","time":"18 min","title":"IA per l'inclusione e i BES","obj":["Produrre materiali accessibili, semplificati e multilingue","Adattare i contenuti a DSA/BES in coerenza con PDP e PEI","Trattare con cautela i dati di salute e le categorie particolari"],"check":["So far semplificare e differenziare un testo per diversi livelli","Collego gli adattamenti IA a quanto previsto in PDP/PEI","Non inserisco diagnosi o dati di salute reali nei tool IA pubblici"],"secs":[{"t":"Materiali accessibili e differenziati","sl":{"prova":"Prendi un brano del tuo programma e chiedi all'IA tre versioni: base, semplificata e ad alta leggibilità, poi confrontale."},"h":"\u003cp class='lp'>L'IA permette di modulare la proposta formativa sui diversi livelli: variare la difficoltà degli esercizi, fornire suggerimenti graduali, creare mappe, sintesi e riassunti. I docenti possono partire da uno stesso contenuto e ricavarne \u003cstrong>materiali differenziati\u003c/strong> adatti ai ritmi di ciascuno.\u003c/p>\n      \u003cdiv class='ib blu'>\u003cdiv class='ibt'>Coerenza con PEI e PDP\u003c/div>\u003cp>Nel caso di studenti con disabilità o DSA, gli strumenti di personalizzazione devono integrare quanto previsto nel \u003cstrong>Piano Educativo Individualizzato (PEI)\u003c/strong> o nel \u003cstrong>Piano Didattico Personalizzato (PDP)\u003c/strong>, adottando le misure a tutela degli interessati.\u003c/p>\u003c/div>"},{"t":"Multilingue e accessibilità","sl":{"rifl":"Quali barriere linguistiche o di accesso incontrano i tuoi studenti? Dove un supporto multilingue farebbe la differenza?"},"h":"\u003cp class='lp'>Funzionalità come il \u003cstrong>supporto multilingue\u003c/strong> e la \u003cstrong>trascrizione automatica\u003c/strong> rendono l'ambiente di apprendimento più accessibile. L'IA aiuta a tradurre consegne e materiali per studenti con background migratorio e a produrre versioni audio o ad alta leggibilità.\u003c/p>\n      \u003cdiv class='g2'>\n        \u003cdiv class='mc'>\u003cdiv class='mct'>🌍 Materiali multilingue\u003c/div>\u003cdiv class='mcp'>Versioni tradotte e semplificate di avvisi, consegne e schede, con revisione del docente.\u003c/div>\u003c/div>\n        \u003cdiv class='mc'>\u003cdiv class='mct'>🔊 Accessibilità\u003c/div>\u003cdiv class='mcp'>Sintesi vocale, trascrizione, riformulazione di testi complessi, mappe per lo studio.\u003c/div>\u003c/div>\n      \u003c/div>"},{"t":"Privacy e cautele sui dati sensibili","sl":{"prova":"Riscrivi una richiesta all'IA su un caso BES sostituendo nome, diagnosi e dati identificativi con segnaposto generici."},"h":"\u003cp class='lp'>I dati su salute, disabilità e DSA sono \u003cstrong>categorie particolari\u003c/strong> (art. 9 GDPR) e richiedono cautele rafforzate.\u003c/p>\n      \u003cdiv class='ib dan'>\u003cdiv class='ibt'>Regola d'oro\u003c/div>\u003cp>Non inserire mai diagnosi, certificazioni o dati identificativi reali di uno studente in un tool IA pubblico. Lavora con \u003cstrong>esempi fittizi\u003c/strong> o anonimizzati e personalizza il documento offline. Il PEI/PDP è un documento riservato: l'IA può aiutarti sulla forma, non deve ricevere i dati reali.\u003c/p>\u003c/div>\n      \u003cdiv class='norma'>\u003cspan class='norma-ico'>📋\u003c/span>\u003cdiv>\u003cdiv class='norma-t'>Riferimenti\u003c/div>\u003cdiv class='norma-d'>GDPR artt. 9 e 5 (minimizzazione) · Linee guida MIM (tutela dei soggetti vulnerabili, in primis i minori) · normativa su inclusione (L. 104/1992, L. 170/2010).\u003c/div>\u003c/div>\u003c/div>"}],"quiz":[{"q":"Gli adattamenti prodotti con l'IA per uno studente con DSA devono…","opts":["sostituire il PDP","essere coerenti con quanto previsto nel PDP/PEI","essere decisi dall'IA","ignorare le misure dispensative"],"cor":1,"exp":"L'IA supporta, ma gli adattamenti devono integrare PDP/PEI a tutela dello studente."},{"q":"Quali dati NON vanno inseriti in un tool IA pubblico?","opts":["Un brano del libro di testo","Diagnosi e dati di salute reali di uno studente","Una consegna generica","Il titolo di un'UDA"],"cor":1,"exp":"Salute e disabilità sono categorie particolari (art. 9 GDPR): usa esempi fittizi."},{"q":"Un uso inclusivo tipico dell'IA per i docenti è…","opts":["Riconoscere le emozioni in classe","Produrre versioni multilingue e semplificate dei materiali","Assegnare i voti automaticamente","Profilare gli studenti"],"cor":1,"exp":"Materiali multilingue e accessibili sono un caso d'uso inclusivo raccomandato."},{"q":"Le funzionalità di trascrizione e sintesi vocale servono soprattutto a…","opts":["sorvegliare gli studenti","aumentare l'accessibilità dell'apprendimento","valutare gli alunni","sostituire il docente di sostegno"],"cor":1,"exp":"Migliorano accessibilità e inclusione, come indicato dalle Linee guida."}]},{"id":23,"fo":"doc","icon":"🧭","time":"18 min","title":"Guidare gli studenti all'uso critico dell'IA","obj":["Educare al pensiero critico e al riconoscimento delle allucinazioni","Promuovere integrità, cittadinanza digitale e valutazione delle fonti","Garantire trasparenza verso studenti e famiglie"],"check":["Insegno a verificare gli output dell'IA e a citare le fonti","Affianco l'uso dell'IA a momenti di confronto e pensiero critico","Sono trasparente su quando e come si usa l'IA in classe"],"secs":[{"t":"Pensiero critico e allucinazioni","sl":{"prova":"Fai generare all'IA un breve testo con riferimenti bibliografici e chiedi agli studenti di verificare se le fonti esistono davvero."},"h":"\u003cp class='lp'>I modelli linguistici producono risposte apparentemente sicure e autorevoli che però possono essere errate o contenere \u003cstrong>riferimenti inventati\u003c/strong> (allucinazioni). Gli studenti vanno guidati a comprendere potenzialità e limiti dell'IA e a sviluppare senso critico.\u003c/p>\n      \u003cdiv class='ib blu'>\u003cdiv class='ibt'>Competenza chiave (DigComp 2.2)\u003c/div>\u003cp>Valorizzare la capacità di \u003cstrong>analizzare, confrontare e valutare\u003c/strong> criticamente la credibilità e l'affidabilità delle fonti (area 1 \"Alfabetizzazione su informazioni e dati\").\u003c/p>\u003c/div>"},{"t":"Integrità e uso etico in classe","sl":{"rifl":"Come distingui un lavoro che usa l'IA come supporto da uno che la usa per aggirare l'apprendimento?"},"h":"\u003cp class='lp'>L'obiettivo è che gli studenti diventino \u003cstrong>co-creatori consapevoli\u003c/strong>, non utilizzatori passivi. Si privilegiano attività di \u003cstrong>content curation\u003c/strong> e produzione critica, evitando che l'IA sostituisca lo sforzo cognitivo.\u003c/p>\n      \u003cdiv class='steps'>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Regole d'uso condivise\u003c/div>\u003cdiv class='step-p'>Concordare quando e come l'IA è ammessa in un compito, e come va dichiarata.\u003c/div>\u003c/div>\u003c/div>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Interazione sociale\u003c/div>\u003cdiv class='step-p'>Alternare l'IA a discussioni e lavori di gruppo per evitare isolamento e dipendenza.\u003c/div>\u003c/div>\u003c/div>\n        \u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Cittadinanza digitale\u003c/div>\u003cdiv class='step-p'>Collegare l'uso dell'IA all'educazione civica e alle competenze digitali.\u003c/div>\u003c/div>\u003c/div>\n      \u003c/div>"},{"t":"Trasparenza con studenti e famiglie","sl":{"prova":"Scrivi due righe da inserire nel patto educativo che spiegano in modo semplice come la classe userà l'IA."},"h":"\u003cp class='lp'>Le decisioni sull'uso dell'IA vanno prese in modo \u003cstrong>trasparente e condiviso\u003c/strong>, coinvolgendo studenti e, quando opportuno, le famiglie attraverso gli organi collegiali. La comunicazione deve essere chiara e comprensibile.\u003c/p>\n      \u003cdiv class='ib suc'>\u003cdiv class='ibt'>In sintesi\u003c/div>\u003cp>Spiegare quando si usa l'IA, perché, e con quali tutele costruisce fiducia e rende l'innovazione sostenibile.\u003c/p>\u003c/div>"}],"quiz":[{"q":"Cosa sono le «allucinazioni» dell'IA?","opts":["Errori di battitura","Output plausibili ma falsi o con fonti inventate","Immagini generate","Virus informatici"],"cor":1,"exp":"Vanno sempre verificate: è un'occasione per educare al pensiero critico e alla valutazione delle fonti."},{"q":"Qual è l'obiettivo nell'uso dell'IA con gli studenti?","opts":["Renderli utilizzatori passivi","Farne co-creatori consapevoli e critici","Sostituire lo studio","Assegnare meno compiti"],"cor":1,"exp":"L'IA non deve sostituire lo sforzo cognitivo: si promuove un uso critico e responsabile."},{"q":"Le scelte sull'uso dell'IA in classe vanno…","opts":["tenute riservate","condivise in modo trasparente con studenti e famiglie","decise dall'IA","imposte senza spiegazioni"],"cor":1,"exp":"La trasparenza e il coinvolgimento (anche tramite organi collegiali) creano fiducia."},{"q":"Quale framework richiamano le Linee guida per valutare le fonti digitali?","opts":["ISO 9001","DigComp 2.2","MEPA","SPID"],"cor":1,"exp":"DigComp 2.2, area 1 'Alfabetizzazione su informazioni e dati'."}]}],"PROMPTS":[{"cat":"Circolari","role":"ata","title":"Circolare colloqui genitori","prompt":"Sei la segretaria dell'IC [nome] di [città].\nScrivi circolare n.[N]/[anno] del [data].\nDestinatari: Docenti, Genitori, Alunni\nOggetto: Colloqui genitori-docenti [periodo]\n\nI colloqui si svolgono [data] dalle [ora]\nalle [ora] nelle aule dei rispettivi docenti.\nPrenotazione: [registro] entro [data]\nFirma: Il Dirigente Scolastico [nome]\n\nFormato: circolare scolastica italiana con\nintestazione, numero protocollo, oggetto\nin grassetto, corpo formale, firma [BOZZA].\nBase: DPR 445/2000 art. 3."},{"cat":"Circolari","role":"ata","title":"Comunicazione urgente (email + SMS)","prompt":"Comunicazione urgente alle famiglie:\nLezioni di domani [data] sospese per [motivo].\nAlunni trasporti: assistenza 8:00-10:00.\nAggiornamenti: [URL sito]\n\nProduci DUE versioni:\n1) Email/registro (max 100 parole)\n2) SMS (max 160 caratteri)\n\nBase: L. 241/1990 art. 8."},{"cat":"Circolari","role":"ata","title":"Circolare uscita didattica","prompt":"Circolare per uscita didattica:\nClasse: [N] — Accompagnatore: Prof. [nome]\nMeta: [luogo] — Data: [data]\nPartenza: [ora] da [luogo] — Rientro: [ora]\nContributo: €[N] entro [data]\nAutorizzazione: da riconsegnare entro [data]\n\nBase: CM 14/1992 (visite guidate)."},{"cat":"Circolari","role":"ata","title":"Variazione orario classe","prompt":"Comunica variazione orario alla famiglia:\nClasse: [N] — Giorno: [data]\nVariazione: [entrata 9:00 / uscita 12:00]\nMotivo: [assenza docente / altra causa]\nValidità: [solo questo giorno / dal X al Y]\n\nTono: professionale e rassicurante.\nMax 80 parole."},{"cat":"Email famiglie","role":"ata","title":"Risposta assenza alunno","prompt":"Email ricevuta:\n'Mio figlio/a [nome] è assente oggi per febbre.'\n\nRisposta professionale (max 100 parole):\n1. Conferma ricezione comunicazione\n2. Procedura giustificazione al rientro\n   (dichiarazione scritta del genitore)\n3. Certificato medico dopo [N] giorni\n   consecutivi (CCNL scuola art. 41)\n4. Auguri di pronta guarigione"},{"cat":"Email famiglie","role":"ata","title":"Risposta richiesta certificato frequenza","prompt":"Risposta a: 'Come richiedo il certificato\ndi frequenza?'\n\nSpiega:\n1. Modalità richiesta (sportello/email)\n2. Documenti necessari\n3. Tempi di rilascio ([N] giorni lavorativi)\n4. Eventuale costo (marca da bollo se\n   necessaria per uso extragiudiziale)\n5. Orari sportello segreteria"},{"cat":"Email famiglie","role":"ata","title":"Benvenuto nuovi iscritti","prompt":"Email di benvenuto per famiglie di\nnuovi iscritti a [ordine scuola].\n\nIncludi:\n- Conferma iscrizione avvenuta\n- Date inizio anno scolastico\n- Come ritirare il materiale\n- Canali di comunicazione (registro [nome],\n  sito [URL], email segreteria)\n- Orari e recapiti segreteria\n\nTono: caloroso e professionale. 250-300 parole."},{"cat":"Email famiglie","role":"ata","title":"Traduzione in arabo","prompt":"Traduci questa circolare in arabo standard\nformale per famiglie con figli in una\nscuola pubblica italiana.\nMantieni tono istituzionale.\nAggiungi il titolo in italiano tra parentesi\nin cima per l'archiviazione.\n\n[Incolla il testo italiano della circolare]\n\nNote: verifica con madrelingua per atti\ncon rilevanza legale o disciplinare."},{"cat":"Email famiglie","role":"ata","title":"FAQ iscrizioni 12 domande","prompt":"Crea FAQ sulle iscrizioni alla [scuola]\ncon 12 domande e risposte semplici su:\n- Documentazione necessaria\n- Procedura online MIUR/Unica\n- Scadenze 2025/2026\n- Criteri precedenza in esubero\n- Scelta del tempo scuola\n- Come segnalare BES, DSA, disabilità\n  [risposta generica — dati specifici offline:\n  base L. 170/2010 e GDPR art. 9]\n\nFormato: domanda in grassetto, risposta sotto."},{"cat":"Verbali","role":"ata","title":"Verbale CdI da appunti","prompt":"Trasforma questi appunti in verbale formale\ndel Consiglio di Istituto:\n\nData: [data] ore [ora] — Luogo: [luogo]\nPresidente: [nome] — Segretario: [nome]\nPresenti: [lista] — Assenti: [nomi]\n\nAPPUNTI:\n[Incolla gli appunti della riunione]\n\nFormato: verbale ufficiale, punti numerati,\nDELIBERA N°X con voti in evidenza.\nBase: DPR 416/1974 (organi collegiali)."},{"cat":"Verbali","role":"ata","title":"ODG Collegio Docenti","prompt":"Prepara ODG per Collegio Docenti di [periodo].\n\nArgomenti:\n1. Analisi scrutini [periodo]\n2. Aggiornamento PTOF (DPR 275/1999)\n3. Piano di miglioramento\n4. Aggiornamento PAI (D.Lgs. 66/2017)\n5. Comunicazioni DS\n6. Varie ed eventuali\n\nPer ogni punto:\n- Titolo formale\n- Scopo (2 righe)\n- Tipo azione (delibera/informazione)\n- Tempo stimato"},{"cat":"Documenti strategici","role":"ata","title":"PTOF — Analisi del contesto","prompt":"Scrivi sezione 'Analisi del contesto'\ndel PTOF 2025-2028.\nBase normativa: DPR 275/1999, art. 3.\n\nDati REALI della scuola:\n- [N] alunni, [N] plessi\n- Territorio: [specificare]\n- Famiglie straniere: [%] — da: [paesi]\n- Livello socioeconomico: [basso/medio/alto]\n- Punti di forza: [specificare]\n- Criticità: [specificare]\n\nCirca 400 parole, linguaggio formale MIUR.\nBOZZA — personalizzare e approvare in CdI."},{"cat":"Documenti strategici","role":"ata","title":"RAV — Priorità strategiche","prompt":"Sulla base dei risultati INVALSI:\n[incolla dati]\nOsservazioni del gruppo di autovalutazione:\n[descrivi]\n\nAiutami a formulare:\n1. Le 2-3 priorità strategiche RAV\n2. Obiettivi di processo correlati\n3. Motivazione delle scelte\n4. Traguardi a 3 anni\n\nUsa il framework RAV ufficiale MIUR.\nBOZZA per il gruppo di autovalutazione."},{"cat":"Docenti — Progettazione","role":"doc","title":"UDA completa (DM 254/2012)","prompt":"Sei docente di [materia] scuola [tipo].\nProgetta UDA su [argomento] per classe [N].\nDurata: [N] settimane — [N] ore totali\nCompetenze (Rac. UE 2018): [specificare]\n\nIncludi:\n1. Titolo accattivante\n2. Competenze chiave europee\n3. Obiettivi (verbi di Bloom, min. 4)\n4. Sequenza attività con tempi\n5. Metodologie didattiche\n6. Rubrica valutazione (DM 62/2017)\n7. Personalizzazioni BES/DSA GENERICHE\n   [mai nomi reali — GDPR art. 9]\nBase: DM 254/2012."},{"cat":"Docenti — Progettazione","role":"doc","title":"Scheda a 3 livelli (inclusione)","prompt":"Crea scheda su [argomento] per classe [N].\nBase: L. 170/2010 e D.Lgs. 66/2017.\n\nLIVELLO BASE (BES/difficoltà):\n- Linguaggio semplice, istruzioni passo-passo\n- Max 5 esercizi con supporto\n- Risposta multipla o completamento\n\nLIVELLO STANDARD:\n- 8-10 esercizi variati\n\nLIVELLO AVANZATO:\n- Problem solving, sfida aperta\n\nStesso argomento, accessibilità calibrata.\nNessun dato reale degli alunni."},{"cat":"Docenti — Valutazione","role":"doc","title":"Rubrica analitica (DM 62/2017)","prompt":"Crea rubrica analitica per [tipo di prova].\nDisciplina: [materia] — Classe: [N]\nBase: DM 62/2017 (criteri valutazione)\n\n- 4-5 criteri SPECIFICI e OSSERVABILI\n- 4 livelli: Avanzato/Intermedio/Base/\n  In via di acquisizione\n- Descrittori MISURABILI:\n  NON 'sa la materia'\n  SÌ 'elenca almeno 3 caratteristiche di...'\n- Corrispondenza voti 4-10\n- Da condividere con studenti PRIMA della prova"},{"cat":"Docenti — Valutazione","role":"doc","title":"Feedback personalizzato motivante","prompt":"Scrivi feedback per uno studente:\nPunti di forza: [specificare]\nDa migliorare: [specificare]\nVoto: [N]/10\n\nIl feedback deve:\n- Riconoscere i punti di forza specificamente\n- Indicare cosa migliorare con chiarezza\n- Suggerire 2-3 azioni concrete\n- Tono motivante e rispettoso\n- Max 100 parole\n- NO frasi generiche ('devi impegnarti')"},{"cat":"Docenti — Relazioni","role":"doc","title":"Relazione finale alunno (anonima)","prompt":"Relazione finale per [ALUNNO_X — codice].\n⚠️ GDPR artt. 8-9: MAI dati identificativi\nreali su IA pubblica. Usa sempre codici.\n\nPunti di forza: [descrivere]\nDifficoltà: [descrivere]\nProgressi: [descrivere]\nComportamento/socializzazione: [descrivere]\nSituazione in uscita: [descrivere]\n\n150-200 parole, tono obiettivo e pedagogico.\n→ Inserisci dati reali SOLO nel file finale\n  OFFLINE (conforme GDPR artt. 8-9)."},{"cat":"Policy e compliance","role":"all","title":"Bozza policy IA per CdI","prompt":"Sei il segretario del Consiglio di Istituto.\nRedigi bozza delibera per policy IA.\n\nIncludi:\n1. Premessa normativa:\n   AI Act (Reg. UE 2024/1689)\n   GDPR (Reg. UE 2016/679 art. 28)\n   DPR 275/1999 (autonomia scolastica)\n2. Ambito: studenti, docenti, personale ATA\n3. Usi consentiti e non consentiti\n4. Obblighi di formazione (CCNL art. 63)\n5. Referente IA designato\n6. Aggiornamento annuale\n\nFormato: delibera CdI con votazione."},{"cat":"Policy e compliance","role":"all","title":"Checklist compliance GDPR per strumento IA","prompt":"Sei il DPO della scuola.\nCrea checklist verifica GDPR per\nnuovo strumento IA:\n\nVerificare:\n1. DPA con il fornitore (art. 28) — sì/no\n2. Localizzazione dati (UE/extra UE)\n3. Base giuridica per categorie speciali (art. 9)\n4. Informativa agli interessati (art. 13)\n5. Diritti degli interessati garantiti\n6. Misure sicurezza adeguate (art. 32)\n7. DPIA necessaria? (art. 35)\n8. Registro trattamenti aggiornato (art. 30)\n\nFormato: tabella SÌ/NO/VERIFICA con note."},{"cat":"Progettazione","role":"doc","title":"Progettare un'UDA","prompt":"Agisci come progettista didattico. Aiutami a costruire un'Unità di Apprendimento per la classe [classe/indirizzo], disciplina [materia], sul tema [argomento]. Indica: traguardi e obiettivi, competenze (disciplinari e trasversali), fasi e attività, materiali, tempi e modalità di verifica. Linguaggio adatto a [ordine di scuola]. Non usare dati personali di studenti reali."},{"cat":"Materiali","role":"doc","title":"Esercizi differenziati","prompt":"Genera 3 set di esercizi sullo stesso argomento [argomento] per la classe [classe]: livello base, intermedio e avanzato. Per ogni esercizio fornisci la soluzione e una breve spiegazione. Includi una versione semplificata ad alta leggibilità per studenti con DSA."},{"cat":"Valutazione","role":"doc","title":"Rubrica di valutazione","prompt":"Aiutami a redigere una rubrica di valutazione per [compito/prodotto] della classe [classe]. Definisci 4 dimensioni con descrittori su 4 livelli (iniziale, base, intermedio, avanzato). Ricorda: la rubrica mi supporta, ma la valutazione finale resta una mia decisione."},{"cat":"Inclusione","role":"doc","title":"Semplificare un testo (BES/DSA)","prompt":"Riscrivi il seguente testo in versione semplificata e ad alta leggibilità, con frasi brevi, lessico chiaro e una mappa dei concetti chiave, mantenendo i contenuti essenziali: [incolla qui il testo]. Non inserire dati personali."},{"cat":"Inclusione","role":"doc","title":"Versione multilingue di una consegna","prompt":"Traduci e adatta questa consegna per una famiglia di lingua [lingua], mantenendo un tono chiaro e cortese e spiegando eventuali termini scolastici italiani: [incolla la consegna]. Segnala se qualche passaggio richiede una verifica per la sua valenza ufficiale."},{"cat":"Feedback","role":"doc","title":"Feedback formativo a uno studente","prompt":"A partire da questi punti di forza e di debolezza [elenco], scrivi un feedback formativo per uno studente di [classe]: incoraggiante, specifico, con 2 suggerimenti concreti di miglioramento. Usa un nome di fantasia, non dati reali."}],"GLOSSARY":[{"term":"AI Act","full":"Reg. UE 2024/1689","def":"Prima legge mondiale organica sull'IA. 4 livelli di rischio (inaccettabile, alto, limitato, minimo). In vigore dal 2024. Artt. 6-7: valutazione studenti = alto rischio. Art. 14: supervisione umana. Art. 50: trasparenza."},{"term":"GDPR","full":"Reg. UE 2016/679","def":"Regolamento europeo protezione dati. Art. 9: categorie speciali (sanitari, DSA, etnia, religione) — vietate su IA senza DPA. Art. 22: no decisioni interamente automatizzate. Art. 28: DPA obbligatorio con fornitori IA."},{"term":"DPA","full":"Data Processing Agreement","def":"Contratto obbligatorio (GDPR art. 28) tra scuola (titolare) e fornitore IA (responsabile). Stabilisce: finalità, durata, misure sicurezza. Senza DPA: ogni uso su dati personali è violazione GDPR."},{"term":"Categorie speciali","full":"GDPR art. 9","def":"Dati che richiedono protezione massima: sanitari, disabilità, DSA, etnia, religione, opinioni politiche, dati giudiziari. MAI inserire in ChatGPT o Claude consumer. Solo sistemi con DPA approvato dal DPO."},{"term":"Allucinazione","full":"Tecnico","def":"Informazione falsa ma plausibile prodotta dall'IA con la stessa sicurezza di quelle corrette. Causa principale di errori in documenti ufficiali. Soluzione: verifica obbligatoria su normattiva.it per ogni norma citata."},{"term":"RCOF","full":"Formula per prompt professionali","def":"Ruolo + Compito + Contesto + Formato. La struttura di prompt che produce output professionali senza allucinazioni strutturali. Esempio: 'Sei la segretaria IC [nome]. Scrivi circolare n.X/2025 per... Formato: circolare italiana con protocollo.'"},{"term":"DPO","full":"Data Protection Officer","def":"Responsabile della Protezione dei Dati: obbligatorio per le PA incluse le scuole (GDPR art. 37). Verifica la compliance GDPR degli strumenti IA, stipula i DPA, aggiorna il registro dei trattamenti."},{"term":"Titolare del trattamento","full":"GDPR art. 4(7)","def":"Chi determina finalità e mezzi del trattamento. In una scuola: l'istituzione/DS. Il fornitore IA è il 'responsabile del trattamento' (art. 4(8)). Il titolare è sempre responsabile della compliance."},{"term":"DPR 275/1999","full":"Autonomia scolastica","def":"Art. 3: il PTOF è approvato dal CdI su proposta del Collegio. Conferisce autonomia organizzativa: base per deliberare la policy IA. L'IA supporta la stesura delle sezioni narrative — l'approvazione è dell'organo."},{"term":"L. 170/2010","full":"Legge DSA","def":"Tutela il diritto allo studio degli alunni con Disturbi Specifici di Apprendimento. Impone il PDP con strumenti compensativi e misure dispensative. I dati del PDP sono sanitari (GDPR art. 9): mai su IA consumer."},{"term":"L. 104/1992","full":"Legge disabilità","def":"Legge-quadro per assistenza e integrazione delle persone con disabilità. Base per il PEI (Piano Educativo Individualizzato). Tutti i dati del PEI sono sanitari: vietato inserirli in piattaforme IA senza DPA."},{"term":"DPR 445/2000","full":"T.U. Documentazione Amministrativa","def":"Art. 3: gli atti amministrativi devono riportare data, protocollo e firma del responsabile. Obblighi verificabili e non delegabili all'IA — la checklist di revisione è il modo per rispettarli."},{"term":"L. 241/1990","full":"Procedimento Amministrativo","def":"Art. 3: obbligo di motivazione degli atti PA con indicazione delle ragioni giuridiche. Atti con normative errate (generate dall'IA) possono essere annullabili. Da qui l'obbligo di verifica su normattiva.it."},{"term":"D.Lgs. 165/2001","full":"Pubblico impiego","def":"Art. 55-bis: responsabilità disciplinare del dipendente pubblico per atti irregolari. Chi firma un documento con errori generati dall'IA non è esente — la produzione con strumenti digitali non costituisce esimente."},{"term":"PNSD","full":"Piano Nazionale Scuola Digitale","def":"Istituito da L. 107/2015, art. 1 cc. 56-57. Obbligo di alfabetizzazione digitale per docenti e ATA. L'Animatore Digitale coordina l'attuazione. Base per inserire la formazione IA nel Piano di Formazione d'Istituto."},{"term":"D.Lgs. 82/2005","full":"Codice Amministrazione Digitale","def":"Art. 12: le PA promuovono l'uso delle tecnologie digitali. Art. 40: le PA formano i propri documenti con mezzi informatici. Base per la digitalizzazione documentale scolastica e l'uso legittimo degli strumenti IA."},{"term":"DM 62/2017","full":"Valutazione scolastica","def":"Art. 2: la valutazione è coerente con i criteri definiti dal Collegio e comunicati alle famiglie. Le rubriche generate con l'IA devono rispettare i criteri approvati collegialmente e essere condivise con gli studenti prima della prova."},{"term":"D.Lgs. 66/2017","full":"Inclusione scolastica","def":"Norme per la promozione dell'inclusione degli studenti con disabilità. La differenziazione dei materiali didattici (schede a 3 livelli) è uno strumento di inclusione supportato dall'IA se
