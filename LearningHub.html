nza compromettere la qualità pedagogica."},{"term":"CCNL Istruzione 2019-2021","full":"Contratto Collettivo","def":"Artt. 22 e 63: diritto-dovere di formazione professionale continua per tutto il personale scolastico. Base per inserire la formazione sull'IA nel Piano di Formazione d'Istituto come adempimento contrattuale."},{"term":"Prov. Garante 30/03/2023","full":"ChatGPT in Italia","def":"Blocco temporaneo di ChatGPT per: assenza base giuridica, nessuna informativa agli utenti, mancanza protezioni per minori. Ripristinato ad aprile 2024 dopo adeguamenti OpenAI. Fondamentale per comprendere i rischi GDPR dell'IA."},{"term":"DM 166/2025","full":"Linee guida IA MIM","def":"Decreto che adotta le Linee guida per l'introduzione dell'IA nelle scuole: 4 pilastri, principi e requisiti etici/tecnici/normativi."},{"term":"Deployer","full":"Utilizzatore (AI Act)","def":"Chi usa un sistema di IA sotto la propria autorità: nelle Linee guida è l'Istituzione scolastica."},{"term":"DPIA","full":"Data Protection Impact Assessment","def":"Valutazione d'impatto sulla protezione dei dati, da svolgere prima del trattamento con nuove tecnologie (artt. 35 ss. GDPR)."},{"term":"FRIA","full":"Fundamental Rights Impact Assessment","def":"Valutazione d'impatto sui diritti fondamentali, obbligatoria per i sistemi di IA ad alto rischio (art. 27 AI Act); integra la DPIA."},{"term":"DPO","full":"Data Protection Officer","def":"Responsabile della protezione dei dati che supporta la scuola fin dall'adozione di un sistema di IA."},{"term":"Sorveglianza umana","full":"Human oversight","def":"Controllo umano sui sistemi di IA per individuare anomalie e intervenire; l'uomo resta responsabile della decisione."},{"term":"Privacy by design/default","full":"GDPR artt. 25","def":"Protezione dei dati integrata fin dalla progettazione e, per impostazione predefinita, solo i dati strettamente necessari."},{"term":"Dati sintetici","full":"Synthetic data","def":"Dati artificiali che riproducono struttura e caratteristiche dei dati reali, usati per ridurre i rischi privacy."},{"term":"Allucinazione","full":"AI hallucination","def":"Output dell'IA plausibile ma falso o con riferimenti inventati: va sempre verificato."},{"term":"Piattaforma Unica","full":"unica.istruzione.gov.it","def":"Portale del MIM che ospita le Linee guida IA, la mappa delle sperimentazioni e gli strumenti di governance."},{"term":"SIDI","full":"Sistema Informativo dell'Istruzione","def":"Piattaforma ministeriale per graduatorie, convocazioni, anagrafe studenti, fascicoli e flussi verso il MIM."},{"term":"NoiPA","full":"Gestione personale PA","def":"Piattaforma per lo stato giuridico-economico e i pagamenti (stipendi, cedolini) del personale."},{"term":"Pago In Rete","full":"PagoPA per la scuola","def":"Servizio per i pagamenti delle famiglie verso la scuola (contributi, viaggi, ecc.)."},{"term":"Gestionale scolastico","full":"Software di segreteria","def":"Applicativi (Argo, Spaggiari/Classeviva, Madisoft Nuvola) per protocollo, registro, alunni e personale."},{"term":"UDA","full":"Unità di Apprendimento","def":"Segmento di percorso didattico centrato su competenze, con compiti e prodotti attesi."},{"term":"PEI","full":"Piano Educativo Individualizzato","def":"Documento per gli studenti con disabilità che definisce obiettivi, strumenti e misure (L. 104/1992)."},{"term":"PDP","full":"Piano Didattico Personalizzato","def":"Piano per studenti con DSA/BES con misure compensative e dispensative (L. 170/2010)."},{"term":"BES","full":"Bisogni Educativi Speciali","def":"Studenti che necessitano di interventi individualizzati per ragioni varie (disabilità, DSA, svantaggio)."},{"term":"DSA","full":"Disturbi Specifici dell'Apprendimento","def":"Dislessia, disgrafia, disortografia, discalculia: richiedono misure personalizzate."},{"term":"DigComp 2.2","full":"Quadro competenze digitali UE","def":"Framework europeo delle competenze digitali; l'area 1 riguarda la valutazione critica di dati e fonti."}],"RESOURCES": le famiglie (Pago In Rete/PagoPA) e tracciabilità (CIG/DURC) vivono nel gestionale di contabilità e nelle piattaforme dedicate. L'IA non sostituisce il software contabile.","norma":"D.I. 129/2018 · normativa su fatturazione elettronica e tracciabilità · contratti pubblici."},{"id":"protocollo","icon":"🗂️","label":"Protocollo / Affari generali","intro":"Punto di transito di tutta la documentazione: registra, classifica, smista e conserva atti e corrispondenza, e presidia trasparenza e accesso agli atti.","compiti":["Protocollo informatico: registrazione, segnatura e classificazione (titolario).","Gestione PEC, circolari interne e smistamento ai responsabili.","Archivio corrente/deposito/storico, conservazione a norma e scarto.","Organi collegiali: convocazioni, verbali, delibere e registro decreti.","Albo online, Amministrazione trasparente e istanze di accesso agli atti."],"aiTips":["Bozze di risposta a PEC e comunicazioni (con revisione e protocollazione).","Sintesi e classificazione provvisoria della corrispondenza in entrata.","Estrazione di scadenze e adempimenti da circolari lunghe."],"piattaforme":"Protocollo informatico, segnatura, conservazione a norma e Albo/Amministrazione trasparente passano dal gestionale di protocollo e dalla segreteria digitale. La registrazione e la classificazione ufficiale le fa il protocollo, non l'IA.","norma":"D.P.R. 445/2000 · D.Lgs. 82/2005 (CAD) · L. 241/1990 · D.Lgs. 33/2013 (trasparenza)."},{"id":"patrimonio","icon":"📦","label":"Patrimonio / Magazzino","intro":"Cura la gestione dei beni mobili e del magazzino, incidendo sulla corretta rappresentazione del patrimonio dell'istituzione.","compiti":["Tenuta e aggiornamento dell'inventario; carico, scarico ed etichettatura.","Ricognizione periodica e rinnovo degli inventari; discarico fuori uso.","Sub-consegne a laboratori e responsabili.","Gestione del magazzino e del materiale di facile consumo.","Supporto agli acquisti: ordini e verifica della corrispondenza ordinato/consegnato/fatturato."],"aiTips":["Generare modelli di verbale di ricognizione o di discarico (da personalizzare).","Organizzare elenchi e registri in tabelle ordinate.","Promemoria e checklist per le scadenze inventariali."],"piattaforme":"Inventario, carico/scarico e discarico sono tenuti nel gestionale di magazzino/patrimonio; gli ordini passano dal MEPA. L'IA non aggiorna l'inventario ufficiale.","norma":"D.I. 129/2018 (gestione patrimoniale e inventariale) · disciplina dei contratti pubblici."}],"LEVELS":[{"min":0,"name":"Apprendista Digitale","icon":"🌱"},{"min":120,"name":"Operatore IA","icon":"⚙️"},{"min":300,"name":"Esperto di Segreteria","icon":"🎯"},{"min":550,"name":"Specialista IA & Normativa","icon":"🛡️"},{"min":850,"name":"Maestro della Segreteria Digitale","icon":"👑"}],"BADGES":[{"id":"first_module","icon":"🚀","name":"Primo Passo","desc":"Completa il tuo primo modulo formativo.","xp":10},{"id":"privacy","icon":"🔒","name":"Custode dei Dati","desc":"Completa il modulo su Privacy, Etica e GDPR.","xp":15},{"id":"perfect_quiz","icon":"💯","name":"Quiz Perfetto","desc":"Rispondi correttamente a tutte le domande di un quiz.","xp":20},{"id":"all_modules","icon":"📚","name":"Percorso Completo","desc":"Completa tutti i moduli formativi.","xp":40},{"id":"settori","icon":"🏛️","name":"Conosci la Segreteria","desc":"Esplora i compiti per settore (dal manuale).","xp":15},{"id":"prompt_user","icon":"🧰","name":"Cassetta degli Attrezzi","desc":"Copia un prompt dalla libreria.","xp":10},{"id":"glossary","icon":"🧠","name":"Mente Normativa","desc":"Consulta il glossario e le norme.","xp":10},{"id":"final_pass","icon":"🎖️","name":"Diplomato IA","desc":"Supera il Test Finale del percorso.","xp":60},{"id":"track_ata","icon":"🏛️","name":"Esperto Segreteria","desc":"Completa tutti i moduli del percorso Segreteria/ATA.","xp":30},{"id":"track_doc","icon":"🍎","name":"Docente Aumentato","desc":"Completa tutti i moduli del percorso Docenti.","xp":30},{"id":"collector","icon":"🏆","name":"Collez <script>
/* =========================================================
   Auth & cloud sync (Supabase) — login con username/password.
   Se Supabase non è configurato, l'app gira in locale (localStorage).
   Carica PRIMA di app.js. initHub() viene chiamato in fondo ad app.js.
   ========================================================= */
const CFG = window.HUB_CONFIG || {};
const CLOUD = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
let sb = CLOUD ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;
let SESSION = null, PROFILE = null, AUTH_MODE = 'login', authBusy = false;
const U_DOMAIN = (CFG.USERNAME_DOMAIN || 'learninghub.local');
const normUser = u => (u || '').trim().toLowerCase();
const uname2email = u => normUser(u).replace(/[^a-z0-9._-]/g, '') + '@' + U_DOMAIN;

/* ---------- BOOT ---------- */
async function initHub(){
  if (!location.hash) location.hash = '#/dashboard';
  if (!CLOUD){ document.body.classList.remove('guest'); render(); return; }
  try {
    const { data } = await sb.auth.getSession();
    SESSION = data.session || null;
  } catch(e){ SESSION = null; }
  if (SESSION) { await afterLogin(); }
  else { renderAuth(); }
  sb.auth.onAuthStateChange((_evt, s) => { SESSION = s; });
}

async function afterLogin(){
  document.body.classList.add('loading');
  try { await loadProfile(); await loadCloudState(); }
  catch(e){ console.warn('Caricamento dati cloud non riuscito:', e); }
  document.body.classList.remove('guest','loading');
  if (!location.hash) location.hash = '#/dashboard';
  render();
}

/* ---------- PROFILO & STATO ---------- */
async function loadProfile(){
  const uid = SESSION.user.id;
  const { data } = await sb.from('profiles').select('username, full_name').eq('id', uid).maybeSingle();
  if (data) { PROFILE = data; return; }
  // crea il profilo se assente (fallback se il trigger non c'è)
  const meta = SESSION.user.user_metadata || {};
  PROFILE = { username: meta.username || (SESSION.user.email || '').split('@')[0], full_name: meta.full_name || '' };
  try { await sb.from('profiles').upsert({ id: uid, username: PROFILE.username, full_name: PROFILE.full_name }); } catch(e){}
}

async function loadCloudState(){
  const uid = SESSION.user.id;
  const { data } = await sb.from('user_progress').select('state').eq('user_id', uid).maybeSingle();
  if (data && data.state) {
    S = Object.assign(def(), data.state);
  } else {
    S = def();
    try { await sb.from('user_progress').upsert({ user_id: uid, state: S, xp: S.xp }); } catch(e){}
  }
  if (!S.name && PROFILE) S.name = PROFILE.full_name || PROFILE.username;
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){}
}

/* ---------- SINCRONIZZAZIONE (chiamata da save() in app.js) ---------- */
let _syncT = null, _syncPending = false;
function queueCloudSync(){
  if (!CLOUD || !SESSION) return;
  _syncPending = true;
  clearTimeout(_syncT);
  _syncT = setTimeout(flushCloudSync, 800);
}
async function flushCloudSync(){
  if (!CLOUD || !SESSION || !_syncPending) return;
  _syncPending = false;
  try {
    await sb.from('user_progress').upsert({
      user_id: SESSION.user.id, state: S, xp: S.xp || 0, updated_at: new Date().toISOString()
    });
  } catch(e){ console.warn('Sync XP non riuscito:', e); _syncPending = true; }
}
// salva al volo se si chiude la pagina
window.addEventListener('beforeunload', () => { if (_syncPending) flushCloudSync(); });

/* ---------- AZIONI AUTH ---------- */
async function doRegister(username, password, fullname){
  const email = uname2email(username);
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { username: normUser(username), full_name: (fullname || '').trim() } }
  });
  if (error) throw error;
  // assicura profilo
  if (data.user) { try { await sb.from('profiles').upsert({ id: data.user.id, username: normUser(username), full_name: (fullname || '').trim() }); } catch(e){} }
  if (data.session) { SESSION = data.session; return; }
  // se non c'è sessione, prova il login (conferma email disattivata)
  const r = await sb.auth.signInWithPassword({ email, password });
  if (r.error) throw new Error("Account creato. Se non riesci ad accedere, disattiva la conferma email in Supabase (Authentication → Email).");
  SESSION = r.data.session;
}
async function doLogin(username, password){
  const { data, error } = await sb.auth.signInWithPassword({ email: uname2email(username), password });
  if (error) throw error;
  SESSION = data.session;
}
async function doLogout(){
  try { await flushCloudSync(); await sb.auth.signOut(); } catch(e){}
  SESSION = null; PROFILE = null; S = def();
  renderAuth();
}

/* ---------- UI: schermata di accesso ---------- */
function setAuthMode(m){ AUTH_MODE = m; renderAuth(); }
function renderAuth(){
  document.body.classList.add('guest');
  const isReg = AUTH_MODE === 'register';
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="auth-wrap"><div class="auth-card">
    <div class="auth-brand"><div class="lg">🎓</div><div><h1>Learning Hub IA</h1><span>Personale ATA e Docenti</span></div></div>
    <div class="auth-title">${isReg ? 'Crea il tuo account' : 'Accedi'}</div>
    <div class="auth-sub">${isReg ? 'Registrati per salvare i progressi e gli XP nel cloud.' : 'Entra per riprendere il tuo percorso da dove l\'hai lasciato.'}</div>
    <div class="auth-tabs">
      <button class="auth-tab ${!isReg ? 'on' : ''}" onclick="setAuthMode('login')">Accedi</button>
      <button class="auth-tab ${isReg ? 'on' : ''}" onclick="setAuthMode('register')">Registrati</button>
    </div>
    <div class="auth-error" id="authErr"></div>
    <div class="field"><label>Username</label><input id="auUser" autocomplete="username" placeholder="es. mrossi" spellcheck="false"></div>
    ${isReg ? `<div class="field"><label>Nome e cognome <span style="font-weight:400;color:var(--dim)">(per l'attestato)</span></label><input id="auName" placeholder="Maria Rossi"></div>` : ''}
    <div class="field"><label>Password</label><input id="auPass" type="password" autocomplete="${isReg ? 'new-password' : 'current-password'}" placeholder="••••••••">${isReg ? '<div class="hint">Almeno 6 caratteri.</div>' : ''}</div>
    ${isReg ? `<div class="field"><label>Conferma password</label><input id="auPass2" type="password" autocomplete="new-password" placeholder="••••••••"></div>` : ''}
    <button class="btn btn-primary auth-btn" id="auBtn" onclick="submitAuth()">${isReg ? 'Crea account' : 'Accedi'}</button>
    <div class="auth-foot">${isReg ? 'Hai già un account? <a href="#" onclick="setAuthMode(\'login\');return false" style="color:var(--primary);font-weight:700">Accedi</a>' : 'Non hai un account? <a href="#" onclick="setAuthMode(\'register\');return false" style="color:var(--primary);font-weight:700">Registrati</a>'}</div>
  </div></div>`;
  const pass = document.getElementById('auPass');
  if (pass) pass.addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
}
function authError(msg){
  const el = document.getElementById('authErr');
  if (el){ el.textContent = msg; el.classList.add('show'); }
}
function setAuthBusy(b){
  authBusy = b;
  const btn = document.getElementById('auBtn');
  if (!btn) return;
  const isReg = AUTH_MODE === 'register';
  btn.disabled = b;
  btn.innerHTML = b ? '<span class="spin"></span>Attendere…' : (isReg ? 'Crea account' : 'Accedi');
}
async function submitAuth(){
  if (authBusy) return;
  const err = document.getElementById('authErr'); if (err) err.classList.remove('show');
  const isReg = AUTH_MODE === 'register';
  const u = (document.getElementById('auUser') || {}).value || '';
  const p = (document.getElementById('auPass') || {}).value || '';
  const name = (document.getElementById('auName') || {}).value || '';
  const p2 = (document.getElementById('auPass2') || {}).value || '';
  if (normUser(u).length < 3) return authError('Lo username deve avere almeno 3 caratteri.');
  if (p.length < 6) return authError('La password deve avere almeno 6 caratteri.');
  if (isReg && p !== p2) return authError('Le password non coincidono.');
  setAuthBusy(true);
  try {
    if (isReg) await doRegister(u, p, name); else await doLogin(u, p);
    await afterLogin();
  } catch(e){
    setAuthBusy(false);
    const m = (e && e.message) || 'Errore di autenticazione.';
    if (/Invalid login/i.test(m)) authError('Username o password non corretti.');
    else if (/already registered|already exists|duplicate/i.test(m)) authError('Questo username è già registrato. Prova ad accedere.');
    else authError(m);
  }
}

// esposizione per onclick inline
Object.assign(window, { initHub, submitAuth, setAuthMode, doLogout, queueCloudSync });

</script>
<script>
/* =========================================================
   IA Learning Hub — app logic (vanilla JS, offline)
   ========================================================= */
const D = window.__DATA__;
const TRAIN = D.M.filter(m => m.secs);            // moduli formativi (1-7)
const FINAL = D.M.find(m => m.final);             // test finale (8)
const byId = id => D.M.find(m => m.id === id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ---------------- STATO ---------------- */
const KEY = 'ia_hub_v1';
const def = () => ({ xp:0, completed:{}, quizBest:{}, badges:{}, checks:{}, flags:{}, finalPassed:false, finalBest:0, name:'' });
let S = load();
function load(){ try { return Object.assign(def(), JSON.parse(localStorage.getItem(KEY))); } catch { return def(); } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} if(typeof queueCloudSync==='function') queueCloudSync(); }

/* ---------------- XP & LIVELLI ---------------- */
function levelIdx(xp){ let i=0; D.LEVELS.forEach((l,k)=>{ if(xp>=l.min) i=k; }); return i; }
function levelInfo(){
  const i = levelIdx(S.xp), cur = D.LEVELS[i], next = D.LEVELS[i+1];
  const floor = cur.min, ceil = next ? next.min : cur.min;
  const pct = next ? Math.min(100, Math.round((S.xp-floor)/(ceil-floor)*100)) : 100;
  return { i, cur, next, pct };
}
function addXp(n){
  if(n<=0) return;
  const before = levelIdx(S.xp);
  S.xp += n; save();
  const after = levelIdx(S.xp);
  if(after>before){ const L=D.LEVELS[after]; toast(L.icon, 'Nuovo livello!', L.name, 'lvl'); confetti(); }
}

/* ---------------- BADGE ---------------- */
function unlock(id){
  if(S.badges[id]) return;
  const b = D.BADGES.find(x=>x.id===id); if(!b) return;
  S.badges[id]=true; save();
  toast(b.icon, 'Traguardo sbloccato', b.name);
  addXp(b.xp);
  // collezionista
  const others = D.BADGES.filter(x=>x.id!=='collector');
  if(others.every(x=>S.badges[x.id])) unlock('collector');
}
const badgeCount = () => Object.keys(S.badges).filter(k=>S.badges[k]).length;

/* ---------------- PROGRESSO ---------------- */
const isDone = id => !!S.completed[id];
const doneCount = () => TRAIN.filter(m=>isDone(m.id)).length;

function completeModule(id, opts){
  opts = opts || {};
  if(isDone(id)) return;
  S.completed[id]=true; save();
  addXp(D.XP.moduleComplete);
  if(doneCount()===1) unlock('first_module');
  if(id===7) unlock('privacy');
  const doneIn = f => { const g=TRAIN.filter(m=>(m.fo||'all')===f); return g.length && g.every(m=>isDone(m.id)); };
  if(doneIn('ata')) unlock('track_ata');
  if(doneIn('doc')) unlock('track_doc');
  if(doneCount()===TRAIN.length) unlock('all_modules');
  toast('✅','Modulo completato','+'+D.XP.moduleComplete+' XP');
  if(opts.auto){ refreshChrome(); } else { render(); }
}
// Aggiorna solo sidebar/topbar (XP, livello, completamenti) senza ridisegnare la vista
function refreshChrome(){
  const a = parseHash();
  const sb2 = document.querySelector('.sidebar'); if(sb2) sb2.innerHTML = renderSidebar(a);
  const tb = document.querySelector('.topbar'); if(tb) tb.innerHTML = renderTopbar(a);
}

/* ---------------- TOAST & CONFETTI ---------------- */
function toast(emoji, title, sub, cls){
  let box = document.querySelector('.toasts');
  if(!box){ box=document.createElement('div'); box.className='toasts'; document.body.appendChild(box); }
  const t = document.createElement('div');
  t.className = 'toast '+(cls||'');
  t.innerHTML = `<div class="te">${emoji}</div><div><div class="tt">${esc(title)}</div><div class="ts">${esc(sub)}</div></div>`;
  box.appendChild(t);
  setTimeout(()=>{ t.style.transition='.4s'; t.style.opacity='0'; t.style.transform='translateX(60px)'; setTimeout(()=>t.remove(),400); }, 3200);
}
function confetti(){
  const colors=['#f7b733','#8a93ff','#39d99a','#fb7185','#5cc8ff','#ffd36b'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.4+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    c.style.opacity=String(0.7+Math.random()*0.3);
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4600);
  }
}

function toggleCheck(mid,i,val){

/* ---------- QUIZ ---------- */
let Q = null; // stato quiz corrente
function startQuiz(id){
  const m = id==='final' ? FINAL : byId(+id);
  Q = { id, m, list:m.quiz, i:0, sel:null, shown:false, correct:0 };
}
function viewQuiz(id){
  startQuiz(id);
  return `<div id="quizMount"></div>`;
}
function renderQuizBody(){
  const mount = document.getElementById('quizMount'); if(!mount) return;
  const { m, list, i, sel, shown } = Q;
  const q = list[i];
  const isFinal = Q.id==='final';
  const letters=['A','B','C','D','E','F'];
  const bar = list.map((_,k)=>`<i class="${k<i?'c':k===i?'now':''}"></i>`).join('');
  mount.innerHTML = `
  <button class="btn btn-ghost no-print" onclick="go('${isFinal?'/dashboard':'/module/'+m.id}')" style="margin-bottom:16px">← ${isFinal?'Dashboard':'Torna al modulo'}</button>
  <h1 class="page">${isFinal?'🏆 Test Finale':'🧠 Quiz — '+esc(m.title)}</h1>
  <p class="lead">Domanda ${i+1} di ${list.length}${isFinal?(' · serve il '+D.XP.finalPassPct+'% per l\'attestato'):' · +'+D.XP.quizCorrect+' XP per risposta corretta'}</p>
  <div class="qbar">${bar}</div>
  <div class="quiz-wrap">
    <div class="qcard">
      <div class="qnum">Domanda ${i+1}</div>
      <div class="qtext">${esc(q.q)}</div>
      <div class="opts">
        ${q.opts.map((o,k)=>{
          let cls='opt';
          if(shown && k===q.cor) cls+=' correct';
          else if(shown && k===sel && k!==q.cor) cls+=' wrong';
          return `<button class="${cls}" ${shown?'disabled':''} onclick="answerQuiz(${k})"><span class="ltr">${letters[k]}</span><span>${esc(o)}</span></button>`;
        }).join('')}
      </div>
      ${shown?`<div class="feedback ${sel===q.cor?'ok':'no'}">
        <div class="ft">${sel===q.cor?'✅ Corretto!':'❌ Non corretto'}</div>
        ${q.exp?`<div>${esc(q.exp)}</div>`:''}
      </div>`:''}
    </div>
    ${shown?`<div style="text-align:right;margin-top:16px"><button class="btn btn-primary" onclick="nextQuiz()">${i<list.length-1?'Prossima domanda →':'Vedi risultato →'}</button></div>`:''}
  </div>`;
}
function answerQuiz(k){
  if(Q.shown) return;
  Q.sel=k; Q.shown=true;
  if(k===Q.list[Q.i].cor) Q.correct++;
  renderQuizBody();
}
function nextQuiz(){
  if(Q.i < Q.list.length-1){ Q.i++; Q.sel=null; Q.shown=false; renderQuizBody(); }
  else finishQuiz();
}
function finishQuiz(){
  const { id, m, list, correct } = Q;
  const total = list.length;
  const mount = document.getElementById('quizMount');
  if(id==='final'){
    const pct = Math.round(correct/total*100);
    const passed = pct >= D.XP.finalPassPct;
    if(pct > S.finalBest) S.finalBest = pct;
    if(passed && !S.finalPassed){ S.finalPassed=true; save(); addXp(D.XP.finalPassBonus); unlock('final_pass'); confetti(); }
    save();
    mount.innerHTML = `
      <div class="quiz-wrap"><div class="qcard" style="text-align:center">
        <div style="font-size:3rem">${passed?'🎖️':'📚'}</div>
        <h2 style="font-family:var(--display);font-size:1.5rem;margin:8px 0">${passed?'Test superato!':'Quasi!'}</h2>
        <p style="color:var(--muted)">Hai totalizzato <strong style="color:var(--accent)">${pct}%</strong> (${correct}/${total}).
        ${passed?'Hai sbloccato l\'attestato del percorso.':'Serve almeno il '+D.XP.finalPassPct+'%. Ripassa i moduli e riprova.'}</p>
        <div class="fl" style="justify-content:center;margin-top:18px">
          <button class="btn btn-ghost" onclick="go('/final')">↻ Riprova</button>
          ${passed?'<button class="btn btn-accent" onclick="go(\'/certificate\')">📜 Vai all\'attestato</button>':'<button class="btn btn-primary" onclick="go(\'/dashboard\')">Torna ai moduli</button>'}
        </div>
      </div></div>`;
    return;
  }
  // quiz di modulo
  const prevBest = S.quizBest[m.id]||0;
  if(correct>prevBest){ addXp((correct-prevBest)*D.XP.quizCorrect); S.quizBest[m.id]=correct; save(); }
  if(correct===total){ if(!S.flags['perfect_'+m.id]){ S.flags['perfect_'+m.id]=true; save(); addXp(D.XP.quizPerfectBonus);} unlock('perfect_quiz'); }
  // completamento automatico: il modulo è "davvero completato" se si supera il quiz (>= 60%)
  const passed = (correct/total) >= 0.6;
  const justCompleted = passed && !isDone(m.id);
  if(justCompleted){ completeModule(m.id, {auto:true}); } else { refreshChrome(); }
  mount.innerHTML = `
    <div class="quiz-wrap"><div class="qcard" style="text-align:center">
      <div style="font-size:3rem">${correct===total?'💯':correct>=total/2?'🎉':'📖'}</div>
      <h2 style="font-family:var(--display);font-size:1.5rem;margin:8px 0">Quiz completato!</h2>
      <p style="color:var(--muted)">Risposte corrette: <strong style="color:var(--success)">${correct}/${total}</strong>${correct===total?' — perfetto!':''}</p>
      ${justCompleted ? `<div class="feedback ok" style="text-align:left;margin-top:14px"><div class="ft">🎉 Modulo completato!</div>Hai superato il quiz: il modulo è stato segnato come completato e hai guadagnato +${D.XP.moduleComplete} XP.</div>`
        : (!passed ? `<div class="feedback no" style="text-align:left;margin-top:14px"><div class="ft">Serve almeno il 60%</div>Ripassa il modulo e riprova il quiz per completarlo e ottenere gli XP.</div>` : '')}
      <div class="fl" style="justify-content:center;margin-top:18px">
        <button class="btn btn-ghost" onclick="go('/quiz/${m.id}')">↻ Riprova</button>
        <button class="btn btn-primary" onclick="go('/dashboard')">Continua →</button>
      </div>
    </div></div>`;
}

  <p class="lead">Una guida rapida ai doveri di ciascun settore — tratta dal manuale degli assistenti amministrativi. Per ogni settore distinguiamo ciò che è <strong>già gestito dalle piattaforme/gestionali</strong> (dove l'IA non entra) dai punti in cui l'IA può davvero <strong>agevolare</strong> il lavoro.</p>
  <div style="margin-top:20px">
  ${D.SETTORI.map(s=>`
    <div class="settore">
      <div class="settore-h"><span class="e">${s.icon}</span><h3>${esc(s.label)}</h3></div>
      <p class="intro">${esc(s.intro)}</p>
      <div class="settore-cols">
        <div><h5>Compiti principali</h5><ul class="compiti">${s.compiti.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>
        <div><h5>✦ Dove l'IA agevola il lavoro</h5><ul class="ai">${s.aiTips.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>
      </div>
      ${s.piattaforme?`<div class="ib dan" style="margin:14px 0 0"><div class="ibt">🖥️ Gestito da piattaforme/gestionali — l'IA non entra</div><p>${esc(s.piattaforme)}</p></div>`:''}
      <div class="norma"><span class="norma-ico">📋</span><div><div class="norma-t">Riferimenti</div><div class="norma-d">${esc(s.norma)}</div></div></div>
    </div>`).join('')}
  </div>
  <div class="ib dan" style="margin-top:8px"><div class="ibt">⚠️ Regola trasversale</div><p>I dati reali di alunni e personale vivono dentro SIDI, NoiPA e i gestionali e lì restano: non vanno mai inseriti in strumenti IA pubblici. L'IA aiuta a <em>scrivere e capire</em> ciò che gira attorno all'atto; l'atto, la firma e la responsabilità restano umani (GDPR art. 22, AI Act art. 14 — sorveglianza umana).</p></div>`;
}

/* ---------- LIBRERIA PROMPT ---------- */
let libFilter = { role:'all', cat:'all' };
function viewLibrary(){
  const cats = ['all', ...new Set(D.PROMPTS.map(p=>p.cat))];
  return `
  <h1 class="page">📚 Libreria Prompt</h1>
  <p class="lead">Prompt pronti all'uso per la segreteria e i docenti, ciascuno con la base normativa di riferimento. Personalizza i campi tra [parentesi] e verifica sempre l'output.</p>
  <div class="filters" id="roleFilters">
    ${[['all','Tutti'],['ata','Segreteria'],['doc','Docenti']].map(r=>`<button class="filter ${libFilter.role===r[0]?'on':''}" onclick="setLibRole('${r[0]}')">${r[1]}</button>`).join('')}
  </div>
  <div class="filters">
    ${cats.map(c=>`<button class="filter ${libFilter.cat===c?'on':''}" onclick="setLibCat('${esc(c).replace(/'/g,"\\'")}')">${c==='all'?'Tutte le categorie':esc(c)}</button>`).join('')}
  </div>
  <div class="prompts" id="promptList">${renderPrompts()}</div>`;
}
function renderPrompts(){
  const list = D.PROMPTS.filter(p =>
    (libFilter.role==='all' || p.role===libFilter.role || p.role==='all') &&
    (libFilter.cat==='all'  || p.cat===libFilter.cat)
  );
  if(!list.length) return `<p style="color:var(--dim)">Nessun prompt per questo filtro.</p>`;
  return list.map((p,idx)=>{
    const roleLbl = p.role==='ata'?'Segreteria':p.role==='doc'?'Docenti':'Tutti';
    return `<div class="pcard">
      <div class="pcard-top"><span class="tag">${esc(p.cat)}</span><span class="tag role-${p.role}">${roleLbl}</span></div>
      <h4>${esc(p.title)}</h4>
      <pre>${esc(p.prompt)}</pre>
      <button class="btn btn-ghost pcopy" onclick="copyPrompt(this,${D.PROMPTS.indexOf(p)})">📋 Copia prompt</button>
    </div>`;
  }).join('');
}
function setLibRole(r){ libFilter.role=r; refreshLib(); }
function setLibCat(c){ libFilter.cat=c; refreshLib(); }
function refreshLib(){ const v=parseHash(); render(); }
function copyPrompt(btn, idx){
  const txt = D.PROMPTS[idx].prompt;
  const fallback = ()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).catch(fallback); } else fallback();
  btn.textContent='✓ Copiato!';
  setTimeout(()=>btn.textContent='📋 Copia prompt',1800);
  if(!S.flags.copied){ S.flags.copied=true; save(); unlock('prompt_user'); }
}

/* ---------- GLOSSARIO ---------- */
function viewGlossary(){
  if(!S.flags.glossary){ S.flags.glossary=true; save(); unlock('glossary'); }
  return `
  <h1 class="page">📖 Glossario e Quadro Normativo</h1>
  <p class="lead">I termini e le norme chiave per usare l'IA nella scuola con consapevolezza.</p>
  <div class="search"><span>🔎</span><input id="glossSearch" placeholder="Cerca un termine o una norma…" oninput="filterGloss(this.value)"></div>
  <div class="gloss" id="glossList">${renderGloss('')}</div>`;
}
function renderGloss(q){
  q=(q||'').toLowerCase().trim();
  const list = D.GLOSSARY.filter(g=>!q || (g.term+' '+(g.full||'')+' '+g.def).toLowerCase().includes(q));
  if(!list.length) return `<p style="color:var(--dim)">Nessun risultato.</p>`;
  return list.map(g=>`<div class="gitem"><div class="gt">${esc(g.term)}</div>${g.full?`<div class="gf">${esc(g.full)}</div>`:''}<div class="gd">${esc(g.def)}</div></div>`).join('');
}
function filterGloss(v){ const el=document.getElementById('glossList'); if(el) el.innerHTML=renderGloss(v); }

/* ---------- RISORSE ---------- */
function viewResources(){
  return `
  <h1 class="page">🔗 Risorse Utili</h1>
  <p class="lead">Fonti ufficiali per verificare normative e strumenti citati dall'IA. Verifica sempre i riferimenti: l'IA può inventarli.</p>
  <div class="reslist" style="margin-top:18px">
    ${D.RESOURCES.map(r=>`<a class="rescard" href="${esc(r.url)}" target="_blank" rel="noopener noreferrer">
      <span class="e">${r.ico}</span>
      <div><h4>${esc(r.title)}</h4><p>${esc(r.desc)}</p><span class="lnk">Apri ↗</span></div>
    </a>`).join('')}
  </div>`;
}

/* ---------- TRAGUARDI ---------- */
function viewAchievements(){
  return `
  <h1 class="page">🎖️ Traguardi</h1>
  <p class="lead">${badgeCount()} di ${D.BADGES.length} traguardi sbloccati. Completa moduli, supera quiz ed esplora gli strumenti per collezionarli tutti.</p>
  <div class="ach-grid" style="margin-top:18px">
    ${D.BADGES.map(b=>{
      const on=!!S.badges[b.id];
      return `<div class="ach ${on?'unlocked':'locked'}">
        <div class="lock">${on?'✓':'🔒'}</div>
        <div class="ae">${b.icon}</div>
        <h4>${esc(b.name)}</h4>
        <p>${esc(b.desc)}</p>
        ${on?`<div style="margin-top:8px;font-size:.72rem;font-weight:700;color:var(--accent)">+${b.xp} XP</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

/* ---------- ATTESTATO ---------- */
function viewCertificate(){
  if(!S.finalPassed){
    return `
    <h1 class="page">📜 Attestato</h1>
    <div class="card cert-lock">
      <div class="e">🔒</div>
      <h2 style="font-family:var(--display)">Attestato bloccato</h2>
      <p style="color:var(--muted);max-width:46ch;margin:8px auto 18px">Supera il <strong>Test Finale</strong> (almeno ${D.XP.finalPassPct}%) per sbloccare l'attestato di completamento del percorso.</p>
      <button class="btn btn-accent" onclick="go('/final')">🏆 Vai al Test Finale</button>
    </div>`;
  }
  const { cur } = levelInfo();
  const date = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
  const name = S.name || 'Il tuo nome';
  return `
  <h1 class="page no-print">📜 Attestato</h1>
  <p class="lead no-print">Clicca sul nome per personalizzarlo, poi stampa o salva in PDF.</p>
  <div class="fl no-print" style="margin:14px 0 20px">
    <button class="btn btn-accent" onclick="window.print()">🖨️ Stampa / Salva PDF</button>
    <button class="btn btn-ghost" onclick="go('/dashboard')">← Dashboard</button>
  </div>
  <div class="certificate">
    <div class="cert-seal">🎖️</div>
    <div class="cert-eyebrow">Attestato di completamento</div>
    <div class="cert-title">Innovazione Digitale Scolastica</div>
    <div class="cert-label">Si certifica che</div>
    <div class="cert-name" contenteditable="true" spellcheck="false" onblur="setName(this.innerText)" oninput="">${esc(name)}</div>
    <div class="cert-body">ha completato con profitto il percorso formativo sull'uso responsabile dell'Intelligenza Artificiale nel lavoro di segreteria, superando il test finale con un punteggio del <strong>${S.finalBest}%</strong> e dimostrando competenza nell'uso degli strumenti IA nel rispetto del GDPR e dell'AI Act.</div>
    <div class="cert-foot">
      <div class="blk">Data<br><b>${date}</b></div>
      <div class="blk" style="text-align:center">Punti esperienza<br><b>${S.xp} XP</b></div>
      <div class="blk" style="text-align:right">Livello raggiunto<br><b>${cur.icon} ${esc(cur.name)}</b></div>
    </div>
  </div>`;
}
function setName(v){ S.name=(v||'').trim().slice(0,60); save(); }

/* =========================================================
   RENDER PRINCIPALE
   ========================================================= */
function render(){
  const active = parseHash();
  document.querySelector('.sidebar').innerHTML = renderSidebar(active);
  document.querySelector('.topbar').innerHTML = renderTopbar(active);
  const app = document.getElementById('app');
  let html='';
  switch(active.view){
    case 'module':      html=viewModule(+active.arg); break;
    case 'quiz':        html=viewQuiz(active.arg); break;
    case 'final':       html=viewQuiz('final'); break;
    case 'settori':     html=viewSettori(); break;
    case 'library':     html=viewLibrary(); break;
    case 'glossary':    html=viewGlossary(); break;
    case 'resources':   html=viewResources(); break;
    case 'achievements':html=viewAchievements(); break;
    case 'certificate': html=viewCertificate(); break;
    default:            html=viewDashboard();
  }
  app.innerHTML = html;
  if(active.view==='quiz' || active.view==='final') renderQuizBody();
  app.scrollTop=0; window.scrollTo(0,0);
  // chiudi sidebar mobile dopo navigazione
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.overlay').classList.remove('show');
}

/* esposizione globale per onclick inline */
Object.assign(window,{ go,toggleSidebar,completeModule,toggleCheck,answerQuiz,nextQuiz,
  setLibRole,setLibCat,copyPrompt,filterGloss,setName });

// Avvio: initHub() (in auth.js) gestisce login/cloud, oppure parte in locale.
if(typeof initHub==='function'){ initHub(); }
else { if(!location.hash) location.hash='#/dashboard'; render(); }

</script>
