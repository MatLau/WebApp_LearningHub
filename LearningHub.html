<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Learning Hub IA — Competenze digitali e innovazione per la scuola.">
<title>Learning Hub IA — Innovazione digitale scolastica</title>
<style>
/* ============== FONT (con fallback offline) ============== */
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg:#0e1022; --bg2:#141733; --panel:#171b3a;
  --surface:rgba(255,255,255,.045); --surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.16);
  --text:#eef1ff; --muted:#aab2d5; --dim:#838bb0;
  --primary:#8a93ff; --primary-d:#6f78ff;
  --accent:#f7b733; --accent2:#ffd36b;
  --success:#39d99a; --danger:#fb7185; --info:#5cc8ff;
  --r:16px; --r-sm:11px;
  --display:"Bricolage Grotesque","Trebuchet MS",system-ui,sans-serif;
  --body:"Plus Jakarta Sans",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"Cascadia Code",Consolas,monospace;
  --sb:288px;
  --c-intro:#8a93ff; --c-personale:#39d99a; --c-alunni:#ffb454; --c-protocollo:#5cc8ff;
  --c-contab:#fb7185; --c-progetti:#c084fc; --c-piattaforme:#2dd4bf; --c-org:#f97316; --c-lab:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body); background:var(--bg); color:var(--text);
  line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh;
  background-image:
    radial-gradient(900px 600px at 12% -8%, rgba(138,147,255,.18), transparent 60%),
    radial-gradient(800px 600px at 96% 0%, rgba(247,183,51,.10), transparent 55%),
    radial-gradient(700px 700px at 80% 110%, rgba(57,217,154,.08), transparent 60%);
  background-attachment:fixed;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:rgba(138,147,255,.35)}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:20px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22);background-clip:content-box}

/* ============== LAYOUT ============== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sb);flex-shrink:0;position:fixed;inset:0 auto 0 0;height:100vh;z-index:40;
  background:linear-gradient(180deg,#13152e,#0f1124);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.main{margin-left:var(--sb);flex:1;min-width:0;display:flex;flex-direction:column}
.content{max-width:1080px;margin:0 auto;padding:26px 30px 90px;width:100%}

/* ============== SIDEBAR ============== */
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand-logo{
  width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:22px;
  background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 6px 18px rgba(138,147,255,.4);flex-shrink:0;
}
.brand h1{font-family:var(--display);font-size:1.04rem;font-weight:800;line-height:1.1;letter-spacing:-.01em}
.brand span{font-size:.7rem;color:var(--dim);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

.lvl-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:14px;position:relative;overflow:hidden;
}
.lvl-card::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 80px at 100% 0,rgba(247,183,51,.18),transparent);pointer-events:none}
.lvl-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lvl-emoji{font-size:1.5rem;filter:drop-shadow(0 2px 6px rgba(247,183,51,.5))}
.lvl-name{font-family:var(--display);font-weight:700;font-size:.92rem;line-height:1.15}
.lvl-sub{font-size:.7rem;color:var(--dim);font-weight:600}
.xp-track{height:9px;border-radius:20px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.xp-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 14px rgba(247,183,51,.6);transition:width .7s cubic-bezier(.34,1.4,.64,1)}
.xp-meta{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:7px;font-weight:600}

.nav-label{font-size:.66rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);padding:14px 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;font-size:.86rem;font-weight:600;
  color:var(--muted);transition:.15s;position:relative;width:100%;text-align:left;
}
.nav-item .ico{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(138,147,255,.22),rgba(138,147,255,.05));color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:3px;background:var(--primary)}
.nav-badge{margin-left:auto;font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.08);color:var(--muted)}
.nav-badge.done{background:rgba(57,217,154,.18);color:var(--success)}

/* ============== HEADER ============== */
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  padding:13px 30px;background:rgba(14,16,34,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
}
.crumb{font-size:.82rem;color:var(--dim);font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.crumb .cur{color:var(--text)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:30px;font-weight:700;font-size:.8rem;border:1px solid var(--border2);background:var(--surface)}
.pill.xp{color:var(--accent);border-color:rgba(247,183,51,.35);background:rgba(247,183,51,.1)}
.pill.badge-count{color:var(--accent2)}
.burger{display:none;width:40px;height:40px;border-radius:11px;background:var(--surface);border:1px solid var(--border);place-items:center;font-size:1.2rem}

/* ============== TYPOGRAPHY / GENERIC ============== */
h1.page{font-family:var(--display);font-size:1.85rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.lead{color:var(--muted);font-size:1rem;margin-top:8px;max-width:64ch}
.sec-head{display:flex;align-items:center;gap:14px;margin:30px 0 16px}
.sec-head h2{font-family:var(--display);font-size:1.25rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.sec-head .line{height:1px;flex:1;background:linear-gradient(90deg,var(--border),transparent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px}

/* ============== HERO ============== */
.hero{
  border-radius:22px;padding:32px 34px;position:relative;overflow:hidden;margin-bottom:22px;
  background:linear-gradient(120deg,rgba(138,147,255,.18),rgba(247,183,51,.10) 70%,transparent);
  border:1px solid var(--border2);
}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(247,183,51,.25),transparent 70%)}
.hero .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2)}
.hero h1{font-family:var(--display);font-size:2.2rem;font-weight:800;letter-spacing:-.025em;line-height:1.05;margin:10px 0 12px;max-width:20ch}
.hero p{color:var(--muted);max-width:58ch;font-size:1.02rem}
.hero-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}

/* ============== BUTTONS ============== */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;font-weight:700;font-size:.88rem;transition:.16s;border:1px solid transparent}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 8px 22px rgba(111,120,255,.35)}
.btn-primary:hover{filter:brightness(1.08);box-shadow:0 10px 26px rgba(111,120,255,.5)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#3a2a05;box-shadow:0 8px 22px rgba(247,183,51,.32)}
.btn-accent:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--surface);border-color:var(--border2);color:var(--text)}
.btn-ghost:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ============== STATS ============== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden}
.stat .v{font-family:var(--display);font-size:1.9rem;font-weight:800;line-height:1}
.stat .l{font-size:.76rem;color:var(--dim);font-weight:600;margin-top:5px}
.stat .ic{position:absolute;right:12px;top:12px;font-size:1.2rem;opacity:.5}

/* ============== GRID CARDS ============== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:16px}
.tile{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;
  transition:.18s;position:relative;overflow:hidden;display:flex;flex-direction:column;
}
.tile:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--surface2);box-shadow:0 14px 34px rgba(0,0,0,.3)}
.tile-ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.45rem;margin-bottom:13px;background:rgba(255,255,255,.06)}
.tile h3{font-family:var(--display);font-size:1.02rem;font-weight:700;letter-spacing:-.01em;line-height:1.2}
.tile p{font-size:.8rem;color:var(--dim);margin-top:4px}
.tile-foot{margin-top:auto;padding-top:14px}
.mini-track{height:6px;border-radius:20px;background:rgba(255,255,255,.08);overflow:hidden}
.mini-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .6s}
.tile-meta{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:.72rem;color:var(--dim);font-weight:600}
.chip{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:20px}
.chip.done{background:rgba(57,217,154,.16);color:var(--success)}
.chip.prog{background:rgba(247,183,51,.16);color:var(--accent)}
.chip.todo{background:rgba(255,255,255,.07);color:var(--dim)}
.tile .num{position:absolute;right:16px;top:16px;font-family:var(--display);font-weight:800;font-size:1.6rem;color:rgba(255,255,255,.07)}

/* ============== MODULE / SLIDE ============== */
.mod-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:8px}
.mod-head .e{font-size:2.2rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
.objs{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin:16px 0 4px}
.obj{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:.86rem;color:var(--muted)}
.obj .d{color:var(--primary);font-weight:800;flex-shrink:0}

.slide-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.slide-counter{font-size:.78rem;color:var(--dim);font-weight:700;display:inline-flex;gap:7px;align-items:center;background:var(--surface);padding:6px 12px;border-radius:20px;border:1px solid var(--border)}
.slide-card{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:30px 32px;min-height:340px;
  animation:slideIn .35s cubic-bezier(.2,.7,.3,1);
}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.slide-title{font-family:var(--display);font-size:1.4rem;font-weight:800;letter-spacing:-.015em;margin-bottom:16px;color:#fff}
.dots{display:flex;gap:7px;justify-content:center;margin:18px 0}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16);transition:.2s;cursor:pointer}
.dot.active{background:var(--accent);width:26px;border-radius:20px}
.dot.visited{background:var(--primary)}
.slide-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:6px}

/* ============== CONTENT BLOCKS (dal corso) ============== */
.md{font-size:.97rem;color:var(--text)}
.lp{margin:0 0 14px;color:var(--muted);line-height:1.7}
.md strong{color:#fff;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 17px}
.mct{font-family:var(--display);font-weight:700;font-size:.95rem;margin-bottom:6px}
.mcp{font-size:.85rem;color:var(--muted);line-height:1.6}
.ib{border-radius:13px;padding:14px 16px;margin:14px 0;border:1px solid var(--border);background:var(--surface)}
.ibt{font-family:var(--display);font-weight:700;font-size:.92rem;margin-bottom:5px}
.ib p{font-size:.87rem;color:var(--muted);line-height:1.6}
.ib.blu{border-color:rgba(92,200,255,.3);background:rgba(92,200,255,.08)} .ib.blu .ibt{color:var(--info)}
.ib.dan{border-color:rgba(251,113,133,.32);background:rgba(251,113,133,.08)} .ib.dan .ibt{color:var(--danger)}
.ib.suc{border-color:rgba(57,217,154,.3);background:rgba(57,217,154,.08)} .ib.suc .ibt{color:var(--success)}
.ib.tea{border-color:rgba(45,212,191,.3);background:rgba(45,212,191,.08)} .ib.tea .ibt{color:var(--piattaforme,#2dd4bf)}
.steps{display:flex;flex-direction:column;gap:11px;margin:14px 0}
.step{display:flex;gap:13px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.step-n{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;display:grid;place-items:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.step-t{font-weight:700;font-size:.9rem;margin-bottom:2px}
.step-p{font-size:.84rem;color:var(--muted);line-height:1.55}
.hb{border-radius:14px;padding:18px 20px;margin:16px 0;background:linear-gradient(135deg,rgba(247,183,51,.14),rgba(247,183,51,.04));border:1px solid rgba(247,183,51,.3)}
.hbt{font-family:var(--display);font-weight:800;font-size:1rem;color:var(--accent2);margin-bottom:8px}
.hbc{font-size:.88rem;color:var(--muted);line-height:1.7;white-space:pre-line}
.dtbl{width:100%;border-collapse:collapse;font-size:.84rem;margin:6px 0}
.dtbl th,.dtbl td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border)}
.dtbl th{background:rgba(255,255,255,.05);font-weight:700;color:var(--text);font-size:.78rem;text-transform:uppercase;letter-spacing:.03em}
.dtbl td{color:var(--muted)}
.dtbl tr:hover td{background:rgba(255,255,255,.025)}
.norma{display:flex;gap:11px;align-items:flex-start;background:rgba(138,147,255,.08);border:1px solid rgba(138,147,255,.28);border-left:3px solid var(--primary);border-radius:11px;padding:12px 14px;margin:14px 0}
.norma-ico{font-size:1.1rem;flex-shrink:0}
.norma-t{font-weight:700;font-size:.85rem;color:var(--primary)}
.norma-d{font-size:.83rem;color:var(--muted);line-height:1.55;margin-top:2px}
.sl-prova{background:rgba(57,217,154,.08);border:1px dashed rgba(57,217,154,.4);border-radius:12px;padding:14px 16px;margin:14px 0}
.sl-prova-t{font-weight:700;font-size:.88rem;color:var(--success);margin-bottom:6px}
.sl-prova-p{font-size:.86rem;color:var(--muted);line-height:1.6}
.sl-rifl{display:flex;gap:9px;align-items:flex-start;font-size:.86rem;color:var(--muted);margin:12px 0;background:var(--surface);border-radius:11px;padding:11px 13px;border:1px solid var(--border)}
.sl-rifl-t{font-size:1.05rem}
.sl-check{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 17px;margin:16px 0}
.sl-check-t{font-family:var(--display);font-weight:700;font-size:.92rem;margin-bottom:10px;color:var(--success)}
.sl-check-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:.87rem;color:var(--muted);cursor:pointer;transition:.15s}
.sl-check-item input{margin-top:3px;width:16px;height:16px;accent-color:var(--success);flex-shrink:0;cursor:pointer}
.fl{display:flex;gap:10px;flex-wrap:wrap}

/* ============== QUIZ ============== */
.quiz-wrap{max-width:720px;margin:0 auto}
.qcard{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px 28px}
.qnum{font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.qtext{font-family:var(--display);font-size:1.18rem;font-weight:700;line-height:1.35;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;text-align:left;padding:13px 15px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-size:.9rem;transition:.15s;width:100%}
.opt:hover:not(:disabled){border-color:var(--border2);background:var(--surface2)}
.opt .ltr{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.07);display:grid;place-items:center;font-weight:800;font-size:.8rem;flex-shrink:0}
.opt.correct{border-color:var(--success);background:rgba(57,217,154,.14)} .opt.correct .ltr{background:var(--success);color:#06281b}
.opt.wrong{border-color:var(--danger);background:rgba(251,113,133,.13)} .opt.wrong .ltr{background:var(--danger);color:#3a0610}
.opt:disabled{cursor:default}
.feedback{border-radius:12px;padding:14px 16px;margin-top:16px;font-size:.87rem;line-height:1.6}
.feedback.ok{background:rgba(57,217,154,.1);border:1px solid rgba(57,217,154,.3)}
.feedback.no{background:rgba(251,113,133,.09);border:1px solid rgba(251,113,133,.28)}
.feedback .ft{font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.qbar{display:flex;gap:5px;justify-content:center;margin:16px 0}
.qbar i{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15)}
.qbar i.c{background:var(--success)} .qbar i.now{background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* ============== PROMPT LIBRARY ============== */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 18px}
.filter{padding:7px 14px;border-radius:30px;font-size:.8rem;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:.15s}
.filter:hover{color:var(--text);border-color:var(--border2)}
.filter.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.prompts{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:15px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:17px 18px;display:flex;flex-direction:column}
.pcard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tag{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(138,147,255,.16);color:var(--primary)}
.tag.role-ata{background:rgba(57,217,154,.16);color:var(--success)}
.tag.role-doc{background:rgba(255,180,84,.16);color:var(--c-alunni)}
.pcard h4{font-family:var(--display);font-size:.98rem;font-weight:700;line-height:1.25}
.pcard pre{font-family:var(--mono);font-size:.76rem;line-height:1.55;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin:11px 0;white-space:pre-wrap;max-height:200px;overflow:auto}
.pcopy{margin-top:auto;align-self:flex-start}

/* ============== GLOSSARY ============== */
.search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:13px;padding:11px 15px;margin-bottom:18px}
.search input{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:.92rem;outline:none}
.search input::placeholder{color:var(--dim)}
.gloss{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}
.gitem{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 17px}
.gitem .gt{font-family:var(--display);font-weight:700;font-size:1rem}
.gitem .gf{font-size:.74rem;color:var(--primary);font-weight:600;margin-bottom:6px}
.gitem .gd{font-size:.84rem;color:var(--muted);line-height:1.55}

/* ============== RESOURCES ============== */
.reslist{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.rescard{display:flex;gap:13px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:.16s}
.rescard:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
.rescard .e{font-size:1.5rem;flex-shrink:0}
.rescard h4{font-family:var(--display);font-size:.95rem;font-weight:700;line-height:1.2}
.rescard p{font-size:.82rem;color:var(--muted);margin-top:4px;line-height:1.5}
.rescard .lnk{font-size:.78rem;color:var(--primary);font-weight:700;margin-top:7px;display:inline-block}

/* ============== SETTORI (manuale) ============== */
.settore{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:15px}
.settore-h{display:flex;align-items:center;gap:13px;margin-bottom:8px}
.settore-h .e{font-size:1.7rem}
.settore-h h3{font-family:var(--display);font-size:1.12rem;font-weight:800}
.settore .intro{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:13px}
.settore-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.settore-cols h5{font-size:.74rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.settore ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.settore li{font-size:.85rem;color:var(--muted);line-height:1.5;padding-left:20px;position:relative}
.settore .compiti li::before{content:"▸";position:absolute;left:0;color:var(--primary);font-weight:800}
.settore .ai li::before{content:"✦";position:absolute;left:0;color:var(--accent)}
.settore .norma{margin-top:14px}

/* ============== ACHIEVEMENTS ============== */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ach{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:18px;text-align:center;position:relative;transition:.2s;overflow:hidden}
.ach.locked{opacity:.5;filter:grayscale(.7)}
.ach.unlocked{border-color:rgba(247,183,51,.4);background:linear-gradient(160deg,rgba(247,183,51,.1),var(--surface))}
.ach.unlocked::after{content:"";position:absolute;inset:0;background:radial-gradient(120px 70px at 50% 0,rgba(247,183,51,.18),transparent);pointer-events:none}
.ach .ae{font-size:2.4rem;margin-bottom:8px}
.ach h4{font-family:var(--display);font-size:.95rem;font-weight:700}
.ach p{font-size:.78rem;color:var(--dim);margin-top:5px;line-height:1.45}
.ach .lock{position:absolute;top:12px;right:12px;font-size:.9rem;opacity:.6}

/* ============== CERTIFICATE ============== */
.cert-lock{text-align:center;padding:48px 24px}
.cert-lock .e{font-size:3.4rem;margin-bottom:14px;opacity:.7}
.certificate{
  background:linear-gradient(150deg,#fbf7ec,#f3ead2);color:#2a2410;border-radius:18px;padding:44px 48px;
  border:2px solid #d9c896;position:relative;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.45);max-width:760px;margin:0 auto;
}
.certificate::before{content:"";position:absolute;inset:14px;border:1.5px solid rgba(160,130,60,.5);border-radius:12px;pointer-events:none}
.cert-seal{position:absolute;top:30px;right:36px;width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#e9b949,#c8901f);display:grid;place-items:center;font-size:2rem;box-shadow:0 6px 18px rgba(160,110,20,.5);color:#fff}
.cert-eyebrow{font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:#9a7d2e;font-weight:700}
.cert-title{font-family:var(--display);font-size:2rem;font-weight:800;color:#3a2f10;margin:6px 0 22px;letter-spacing:-.01em}
.cert-label{font-size:.82rem;color:#6b5a2a}
.cert-name{font-family:var(--display);font-size:2.1rem;font-weight:800;color:#1f1a08;border-bottom:2px solid rgba(160,130,60,.4);display:inline-block;padding:4px 26px 6px;margin:8px 0 18px;min-width:280px}
.cert-name[contenteditable]{outline:none}
.cert-body{font-size:.96rem;color:#4a3f1c;line-height:1.7;max-width:54ch}
.cert-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:34px;gap:20px}
.cert-foot .blk{font-size:.8rem;color:#6b5a2a}
.cert-foot .blk b{display:block;font-family:var(--display);font-size:1rem;color:#2a2410}
@media print{
  body{background:#fff}
  .sidebar,.topbar,.no-print{display:none!important}
  .main{margin:0}.content{padding:0;max-width:none}
  .certificate{box-shadow:none;border-color:#caa}
}

/* ============== TOAST / CONFETTI ============== */
.toasts{position:fixed;top:18px;right:18px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{
  display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border2);border-left:4px solid var(--accent);
  border-radius:13px;padding:13px 17px;min-width:250px;box-shadow:0 16px 40px rgba(0,0,0,.5);
  animation:toastIn .4s cubic-bezier(.2,.9,.3,1.3);
}
.toast.lvl{border-left-color:var(--primary)}
.toast .te{font-size:1.7rem}
.toast .tt{font-weight:800;font-size:.9rem}
.toast .ts{font-size:.76rem;color:var(--muted)}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:none}}
.confetti{position:fixed;top:-12px;width:10px;height:14px;z-index:150;pointer-events:none;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}

/* ============== OVERLAY (mobile) ============== */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,6,16,.6);z-index:35;backdrop-filter:blur(2px)}

/* ============== RESPONSIVE ============== */
@media (max-width:980px){.g2,.settore-cols{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
@media (max-width:820px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .main{margin-left:0}
  .burger{display:grid}
  .overlay.show{display:block}
  .content{padding:20px 18px 80px}
  .topbar{padding:12px 18px}
  .hero{padding:26px 22px}.hero h1{font-size:1.7rem}
  .slide-card{padding:22px 20px}
}
@media (max-width:480px){.stats{grid-template-columns:1fr 1fr}.pill.badge-count{display:none}}

/* ============== AUTH / CLOUD ============== */

body.guest .main{margin-left:0}
body.guest .content{max-width:none;padding:0}

.auth-card{width:100%;max-width:430px;background:var(--panel);border:1px solid var(--border2);border-radius:22px;padding:32px 30px;box-shadow:0 30px 70px rgba(0,0,0,.45)}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}

.auth-brand h1{font-family:var(--display);font-size:1.15rem;font-weight:800;line-height:1.1}
.auth-brand span{font-size:.72rem;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.auth-title{font-family:var(--display);font-size:1.5rem;font-weight:800;margin:18px 0 4px}
.auth-sub{font-size:.86rem;color:var(--muted);margin-bottom:18px}
.auth-tabs{display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:18px}
.auth-tab{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:.85rem;color:var(--muted);transition:.15s}
.auth-tab.on{background:var(--primary);color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px}

.auth-error.show{display:block}
.auth-foot{font-size:.78rem;color:var(--dim);text-align:center;margin-top:16px;line-height:1.5}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes sp{to{transform:rotate(360deg)}}
.user-chip{display:inline-flex;align-items:center;gap:8px;padding:5px 6px 5px 12px;border-radius:30px;background:var(--surface);border:1px solid var(--border2);font-size:.8rem;font-weight:700}
.user-chip .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;font-size:.78rem;color:#fff}
.user-chip button{font-size:.74rem;color:var(--muted);padding:4px 8px;border-radius:8px}
.user-chip button:hover{color:var(--danger);background:rgba(251,113,133,.1)}
.cloud-banner{display:flex;align-items:center;gap:10px;background:rgba(92,200,255,.1);border:1px solid rgba(92,200,255,.3);border-radius:12px;padding:10px 14px;margin-bottom:18px;font-size:.82rem;color:var(--muted)}
.cloud-banner b{color:var(--info)}
.cloud-tag{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px}

<script>
window.__DATA__ = {"M":[{"id":0,"title":"Home","icon":"🏠","welcome":true},{"id":1,"title":"Fondamenti dell'IA","icon":"🧠","time":"25 min","fo":"all","obj":["Comprendere cos'è l'IA e il Machine Learning","Distinguere i tipi di IA e riconoscerli nel quotidiano","Conoscere e usare ChatGPT, Claude, Gemini, Copilot","Capire le allucinazioni e come gestirle"],"check":["So distinguere la programmazione tradizionale dal Machine Learning","Conosco almeno 2 strumenti IA adatti alla mia scuola","Ho aperto e usato uno strumento IA per la prima volta","So cos'è un'allucinazione e come verificarla","Conosco la regola d'oro per i documenti ufficiali"],"secs":[{"t":"Cos'è l'Intelligenza Artificiale","sl":{"prova":"Apri ChatGPT (chat.openai.com) o Claude (claude.ai) sul tuo smartphone o computer — basta un'email per registrarsi gratuitamente. Scrivi questo primo messaggio: 'Sono la segretaria/il segretario di una scuola media italiana. Elenca 5 attività che svolgo ogni giorno e per ciascuna dimmi come potresti aiutarmi.' Leggi la risposta e segna le 2-3 applicazioni che ti sembrano subito utili.","rifl":"Quale delle attività elencate dall'IA ti prende più tempo ogni settimana? Segnatelo — sarà il tuo primo caso d'uso concreto da usare nei prossimi esercizi."},"h":"\u003cp class='lp'>L'\u003cstrong>Intelligenza Artificiale (IA)\u003c/strong> è un ramo dell'informatica che permette alle macchine di svolgere compiti che tradizionalmente richiedevano intelligenza umana: capire il linguaggio, riconoscere immagini, tradurre, prendere decisioni, generare testi.\u003c/p>\u003cp class='lp'>A differenza di un programma tradizionale — che esegue istruzioni rigide scritte dal programmatore — un sistema di IA \u003cstrong>impara dai dati\u003c/strong> e migliora con l'esperienza.\u003c/p>\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>Programmazione tradizionale\u003c/div>\u003cdiv class='mcp'>Regole scritte dal programmatore. Input → Regole fisse → Output. Esempio: se presenza &lt; 75% → genera avviso. Prevedibile ma rigido.\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>Machine Learning\u003c/div>\u003cdiv class='mcp'>Il sistema trova le regole dai dati. Analizza milioni di esempi e impara i pattern da solo. Flessibile ma può sbagliare.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='ib blu'>\u003cdiv class='ibt'>L'IA non è nuova nella tua scuola\u003c/div>\u003cp>Il filtro antispam delle tue email, il correttore automatico di Word, Google Translate, il Face ID del tuo telefono: tutti usano già l'IA. Quello che è nuovo è la sua \u003cstrong>accessibilità\u003c/strong> per compiti complessi come scrivere documenti.\u003c/p>\u003c/div>"},{"t":"Come funziona: Machine Learning e Deep Learning","sl":{"prova":"Chiedi all'IA: 'Scrivi una circolare scolastica per comunicare ai genitori che giovedì prossimo ci sono i colloqui con i docenti dalle 16 alle 19.' Osserva cosa succede: l'IA genera qualcosa di plausibile ma probabilmente con date errate o inventate. Questo è il tuo primo contatto con le allucinazioni.","rifl":"Quali dati mancavano nel tuo prompt per ottenere una circolare davvero utilizzabile? Questo esercizio ti prepara alla sezione sulla formula RCOF."},"h":"\u003cp class='lp'>Il cuore dell'IA moderna è il \u003cstrong>Machine Learning\u003c/strong>. I modelli come ChatGPT e Claude sono stati addestrati su miliardi di testi e hanno imparato strutture linguistiche, concetti e come rispondere in modo pertinente. Ma non 'sanno' — fanno previsioni statistiche.\u003c/p>\u003cdiv class='steps'>\u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Raccolta dati\u003c/div>\u003cdiv class='step-p'>Miliardi di testi da libri, articoli, siti web. La qualità del modello dipende dalla qualità dei dati.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Addestramento\u003c/div>\u003cdiv class='step-p'>Il modello identifica pattern statistici. Settimane di elaborazione su centinaia di server. Il risultato: un modello che 'prevede' la risposta più probabile.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Utilizzo\u003c/div>\u003cdiv class='step-p'>Il modello risponde alle tue richieste. Ogni risposta è una previsione — non un fatto verificato. Ecco perché le allucinazioni esistono.\u003c/div>\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='ib dan'>\u003cdiv class='ibt'>⚠️ Le allucinazioni — il rischio principale\u003c/div>\u003cp>L'IA può generare numeri di circolari ministeriali inventati, normative inesistenti, date errate — con la stessa sicurezza delle informazioni corrette. La verifica umana è sempre obbligatoria per documenti ufficiali.\u003c/p>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">AI Act — Reg. UE 2024/1689\u003c/div>\u003cdiv class=\"norma-d\">Considerando 47: i sistemi IA devono essere robusti e i loro output verificati da esseri umani qualificati prima di produrre effetti giuridici. La responsabilità del firmatario non è mai trasferita all'IA.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Tipi di IA e strumenti: ChatGPT, Claude, Gemini, Copilot","sl":{"prova":"Prova questo confronto pratico: chiedi la stessa cosa sia a ChatGPT sia a DeepL (deepl.com): 'Traduci in arabo: I colloqui si svolgeranno giovedì 20 novembre dalle 16 alle 19.' Confronta le due traduzioni. Poi torna a ChatGPT e chiedi anche la traduzione in rumeno e in cinese. Stai usando 3 tipi di IA: un LLM generativo e un sistema di traduzione specializzato.","rifl":"Nella tua scuola ci sono famiglie straniere? In quali lingue comunicate attualmente? Immagina come cambierebbe la comunicazione se potessi tradurre ogni circolare in 5 minuti."},"h":"\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Strumento\u003c/th>\u003cth>Punto di forza\u003c/th>\u003cth>Per la scuola con contratto\u003c/th>\u003cth>Accesso gratuito\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>\u003cstrong>ChatGPT\u003c/strong>\u003c/td>\u003ctd>Versatile, ottimo per task quotidiani\u003c/td>\u003ctd>Enterprise (a pagamento)\u003c/td>\u003ctd>✅ chat.openai.com\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Claude\u003c/strong>\u003c/td>\u003ctd>Testi lunghi, stile formale, analisi documenti\u003c/td>\u003ctd>Claude for Work (a pagamento)\u003c/td>\u003ctd>✅ claude.ai\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Gemini\u003c/strong>\u003c/td>\u003ctd>Integrato in Google Docs, Gmail, Drive\u003c/td>\u003ctd>✅ Google Workspace for Education\u003c/td>\u003ctd>Limitato\u003c/td>\u003c/tr>\u003ctr>\u003ctd>\u003cstrong>Copilot\u003c/strong>\u003c/td>\u003ctd>Integrato in Word, Outlook, Excel, Teams\u003c/td>\u003ctd>✅ Microsoft 365 Education\u003c/td>\u003ctd>Limitato\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003cdiv class='ib suc'>\u003cdiv class='ibt'>Il punto di partenza giusto per te\u003c/div>\u003cp>\u003cstrong>Scuola con Microsoft 365:\u003c/strong> attiva Copilot in Word. \u003cstrong>Scuola con Google Workspace:\u003c/strong> usa Gemini nei Docs. \u003cstrong>Nessuno dei due:\u003c/strong> ChatGPT o Claude gratuiti sono ottimi per iniziare — solo per dati anonimi (vedi Modulo 7).\u003c/p>\u003c/div>"},{"t":"La regola d'oro e la checklist di sicurezza","sl":{"prova":"TEST DI ALLUCINAZIONE: chiedi all'IA: 'Qual è il numero della circolare ministeriale MIUR del 2024 sull'uso dell'intelligenza artificiale nelle scuole?' Poi vai su istruzione.it e cerca quella circolare. Esiste? Se l'IA ha inventato un numero plausibile, hai appena 'toccato' con mano il rischio principale. Annota cosa hai trovato.","rifl":"Dopo questo test: come cambieresti il tuo approccio all'uso dell'IA per atti ufficiali come circolari, note all'UST o verbali?"},"h":"\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>✅ L'IA sa fare bene\u003c/div>\u003cdiv class='mcp'>Scrivere, riscrivere, riassumere, tradurre, strutturare, spiegare, generare bozze, correggere testi, brainstorming creativo, adattare lo stile.\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>❌ Limitazioni importanti\u003c/div>\u003cdiv class='mcp'>Allucinazioni (info false), nessuna memoria tra sessioni, data di cut-off (non conosce eventi recenti), nessuna responsabilità giuridica propria.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='hb'>\u003cdiv class='hbt'>⭐ La regola d'oro — da non dimenticare mai\u003c/div>\u003cdiv class='hbc'>L'output dell'IA è come il lavoro di un tirocinante brillante ma inesperto: ottimo punto di partenza, richiede sempre la revisione di un professionista prima di essere firmato, pubblicato o inviato.\n\nChecklist minima per ogni documento ufficiale:\n✓ Date → verifica sul calendario\n✓ Normative → verifica su normattiva.it\n✓ Nomi e titoli → verifica nell'organigramma\n✓ Numeri di protocollo → inseriti manualmente\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">GDPR — Reg. UE 2016/679, art. 22\u003c/div>\u003cdiv class=\"norma-d\">Vieta le decisioni basate esclusivamente su trattamento automatizzato che producono effetti giuridici. L'IA supporta il processo decisionale ma non lo sostituisce — la firma del responsabile non è mai delegabile alla macchina.\u003c/div>\u003c/div>\u003c/div>"}],"quiz":[{"q":"Qual è la differenza fondamentale tra programmazione tradizionale e Machine Learning?","opts":["Il ML è molto più veloce nei calcoli","La PT usa regole fisse; il ML impara i pattern dai dati","Il ML funziona solo con connessione internet veloce","Non esiste differenza sostanziale tra i due"],"cor":1,"exp":"Nel Machine Learning il sistema trova autonomamente le regole analizzando i dati — nella PT le regole sono scritte dal programmatore. Questa differenza spiega sia la potenza (flessibilità, linguaggio naturale) che i limiti (allucinazioni) dell'IA generativa."},{"q":"Cosa sono le 'allucinazioni' dell'IA e quale norma richiede la verifica umana?","opts":["Immagini distorte — vietate dall'AI Act art. 5","Informazioni false prodotte con sicurezza — l'AI Act impone verifica umana per output con effetti giuridici","Risposte offensive — regolate dal GDPR art. 9","Errori di formattazione — risolti con il riavvio"],"cor":1,"exp":"Le allucinazioni sono informazioni false ma plausibili prodotte con la stessa sicurezza di quelle corrette. L'AI Act (Reg. UE 2024/1689), considerando 47, richiede che gli output con effetti giuridici siano verificati da persone qualificate."},{"q":"Quale strumento IA ha già un DPA incluso nel contratto per le scuole con Microsoft 365 Education?","opts":["ChatGPT (versione gratuita)","Claude (versione consumer)","Microsoft Copilot in M365 Education","Google Translate web"],"cor":2,"exp":"Microsoft Copilot in M365 Education include un Data Processing Agreement nel contratto educativo: dati non usati per addestrare il modello, storage EU conforme GDPR. Questo è il punto di partenza più sicuro per le scuole già dotate di M365."},{"q":"Chi è responsabile se una circolare ufficiale con dati errati generati dall'IA viene pubblicata?","opts":["Il fornitore dello strumento IA","Nessuno — è un errore della macchina","Il DS o chi ha firmato il documento","Il personale ATA che ha usato l'IA"],"cor":2,"exp":"Il firmatario è sempre responsabile del contenuto del documento ufficiale — GDPR art. 22 e L. 241/1990 art. 3 si applicano indipendentemente dallo strumento usato. L'IA non ha responsabilità giuridica: è uno strumento."},{"q":"Qual è il primo passo del workflow efficiente con l'IA?","opts":["Aprire subito ChatGPT e scrivere velocemente","Raccogliere tutti i dati fattuali PRIMA di aprire l'IA","Guardare un tutorial su YouTube","Chiedere all'IA cosa devo fare"],"cor":1,"exp":"Raccogliere date, nomi, numeri e normative PRIMA di aprire l'IA è il passo più importante. L'IA produce output molto migliori quando riceve informazioni complete, riducendo drasticamente la necessità di correzioni."}]},{"id":2,"title":"IA nella Scuola Italiana","icon":"🏫","time":"22 min","fo":"all","obj":["Conoscere AI Act e classificazione del rischio","Comprendere gli obblighi GDPR per la scuola","Identificare opportunità per il proprio ruolo","Pianificare i primi passi concreti"],"check":["Conosco i 4 livelli di rischio dell'AI Act e dove si colloca il mio uso quotidiano","So cosa è un DPA e perché è obbligatorio per la mia scuola","Conosco il provvedimento del Garante su ChatGPT e le sue implicazioni","Ho identificato i 3 usi IA più utili per il mio ruolo","So quali sono i primi passi concreti per la mia scuola"],"secs":[{"t":"Il quadro normativo: AI Act europeo","sl":{"prova":"Vai su EUR-Lex (eur-lex.europa.eu) e cerca 'Regolamento 2024/1689'. Scorri fino all'Allegato III: leggi il punto 3 dedicato all'istruzione. Confermalo tu stesso: l'uso dell'IA per valutare studenti è esplicitamente elencato come 'alto rischio'. Questo è il testo di legge che si applica al tuo istituto.","rifl":"Nella tua scuola si usa o potrebbe usarsi l'IA per valutare studenti o distribuire risorse educative? Se sì, quali adempimenti serviranno in base all'AI Act?"},"h":"\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Livello\u003c/th>\u003cth>Esempi in ambito scolastico\u003c/th>\u003cth>Obblighi\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>🔴 Inaccettabile\u003c/td>\u003ctd>Sorveglianza biometrica studenti, scoring comportamento\u003c/td>\u003ctd>Vietati — art. 5\u003c/td>\u003c/tr>\u003ctr>\u003ctd>🟠 Alto rischio\u003c/td>\u003ctd>IA per valutare studenti, orientarli, classificarli\u003c/td>\u003ctd>Documentazione, supervisione umana, trasparenza — artt. 9-15\u003c/td>\u003c/tr>\u003ctr>\u003ctd>🟡 Rischio limitato\u003c/td>\u003ctd>Chatbot con famiglie, avatar didattici\u003c/td>\u003ctd>Dichiarare che si tratta di IA — art. 50\u003c/td>\u003c/tr>\u003ctr>\u003ctd>🟢 Rischio minimo\u003c/td>\u003ctd>Circolari, email, verbali, traduzioni, PTOF\u003c/td>\u003ctd>Nessun obbligo specifico — buone pratiche\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">AI Act — Reg. UE 2024/1689, artt. 6-7\u003c/div>\u003cdiv class=\"norma-d\">I sistemi IA usati in ambito educativo per valutare studenti, selezionarli o orientarli = ALTO RISCHIO. Richiedono: documentazione tecnica, supervisione umana continua, registrazione delle attività, trasparenza verso gli interessati.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Il quadro normativo italiano e il GDPR","sl":{"prova":"Vai su garanteprivacy.it e cerca 'ChatGPT'. Trova il provvedimento del 30 marzo 2023 e leggi i 3 motivi principali del blocco temporaneo. Poi cerca il provvedimento dell'aprile 2024 con gli adeguamenti richiesti a OpenAI. Questo ti dà il contesto legale reale dell'IA in Italia.","rifl":"La tua scuola ha già una policy sull'uso dell'IA deliberata in CdI? Se no, chi potrebbe proporla? Quando sarebbe il momento giusto per portarla in agenda?"},"h":"\u003cul class='fl'>\u003cli>\u003cstrong>GDPR\u003c/strong> \u003cspan class='norm'>Reg. UE 2016/679\u003c/span>: art. 9 categorie speciali, art. 22 no decisioni automatizzate, art. 28 DPA obbligatorio con fornitori IA\u003c/li>\u003cli>\u003cstrong>D.Lgs. 196/2003\u003c/strong> \u003cspan class='norm'>Codice Privacy\u003c/span>: adeguato al GDPR dal D.Lgs. 101/2018. Disciplina il trattamento dei dati scolastici a livello nazionale\u003c/li>\u003cli>\u003cstrong>PNSD\u003c/strong> \u003cspan class='norm'>L. 107/2015 art. 1 cc. 56-57\u003c/span>: Piano Nazionale Scuola Digitale — obbligo di alfabetizzazione digitale per docenti e ATA\u003c/li>\u003cli>\u003cstrong>Provvedimento Garante 30/03/2023\u003c/strong>: blocco temporaneo ChatGPT per violazione GDPR (assenza base giuridica, mancanza protezione minori). Ripristinato dopo adeguamenti OpenAI\u003c/li>\u003cli>\u003cstrong>DPR 275/1999\u003c/strong> \u003cspan class='norm'>Autonomia scolastica\u003c/span>: ogni istituto ha autonomia per adottare una policy IA, da deliberare in CdI\u003c/li>\u003c/ul>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">GDPR — Reg. UE 2016/679, art. 28\u003c/div>\u003cdiv class=\"norma-d\">Il titolare del trattamento (la scuola/DS) DEVE stipulare un Data Processing Agreement con qualsiasi fornitore IA che elabora dati personali per suo conto. Senza DPA, ogni uso su dati personali reali è una violazione del GDPR soggetta a sanzioni fino al 4% del fatturato mondiale del fornitore.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Opportunità per ogni ruolo e piano di integrazione","sl":{"prova":"Crea la tua lista personale: scrivi 3 attività che svolgi ogni settimana che potrebbero essere supportate dall'IA. Per ciascuna stima: quanto tempo richiede attualmente? Quanto richiederebbe con l'IA? Quanto risparmieresti a settimana? Questa è la tua 'analisi del valore' personale.","rifl":"Quale resistenza ti aspetti da parte dei colleghi quando presenterai queste opportunità? Come risponderesti alla preoccupazione più comune: 'Ma poi gli errori li fa l'IA e siamo noi a firmare'?"},"h":"\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>🗂️ Segreteria ATA\u003c/div>\u003cdiv class='mcp'>Circolari: 30-45 min → 5-10 min. Email famiglie: 10 min → 2 min. Verbali: 90 min → 20 min. Multilingua: 60 min → 8 min. Stima: 2-4 ore risparmiate a settimana.\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>👩‍🏫 Docenti\u003c/div>\u003cdiv class='mcp'>UDA: 3-4 ore → 45 min. Materiali differenziati: 2 ore → 30 min. Rubriche: 1 ora → 15 min. Relazioni: 45 min → 15 min.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='steps'>\u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Settimana 1: primo utilizzo\u003c/div>\u003cdiv class='step-p'>Scegli UN compito ripetitivo. Genera il primo prompt RCOF. Confronta con il metodo tradizionale. Calcola il tempo risparmiato.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Mese 1: costruire i template\u003c/div>\u003cdiv class='step-p'>Crea 5-10 template riutilizzabili per i task più frequenti. Condivili con i colleghi. Aggiorna il tuo repertorio.\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Mese 2-3: proporre la policy\u003c/div>\u003cdiv class='step-p'>Porta la proposta di policy IA al DS o all'Animatore Digitale. Base normativa: DPR 275/1999 per la delibera CdI.\u003c/div>\u003c/div>\u003c/div>\u003c/div>"},{"t":"Le Linee guida MIM per l'IA a scuola (DM 166/2025)","sl":{"prova":"Apri le Linee guida sulla piattaforma Unica e individua, per il tuo ruolo, due aree di applicazione dell'IA tra quelle elencate dal Ministero per il personale amministrativo.","rifl":"La tua scuola ha già nominato una figura di riferimento per l'IA e definito chi fa cosa nella governance?"},"h":"\n  \u003cp class='lp'>Il 9 agosto 2025 il Ministero dell'istruzione e del merito ha adottato, con \u003cstrong>DM n. 166/2025\u003c/strong>, le \u003cstrong>Linee guida per l'introduzione dell'Intelligenza Artificiale nelle Istituzioni scolastiche\u003c/strong> (versione 1.0). Non sono un divieto né un libretto di istruzioni tecnico: danno un quadro per adottare l'IA in modo consapevole, sicuro e conforme a GDPR e AI Act.\u003c/p>\n\n  \u003cdiv class='ib blu'>\u003cdiv class='ibt'>I quattro pilastri del modello\u003c/div>\n  \u003cp>1) \u003cstrong>Principi di riferimento\u003c/strong> · 2) \u003cstrong>Requisiti di base\u003c/strong> (etici, tecnici, normativi) · 3) \u003cstrong>Framework di implementazione\u003c/strong> (il ciclo di un progetto) · 4) \u003cstrong>Comunicazione e governance\u003c/strong> (monitoraggio tramite la piattaforma Unica).\u003c/p>\u003c/div>\n\n  \u003ch4 style='font-family:var(--display);margin:18px 0 8px'>I 6 principi di riferimento\u003c/h4>\n  \u003cdiv class='g2'>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>👤 Centralità della persona\u003c/div>\u003cdiv class='mcp'>Approccio antropocentrico: l'uomo resta al centro e mantiene il governo dei sistemi di IA.\u003c/div>\u003c/div>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>⚖️ Equità\u003c/div>\u003cdiv class='mcp'>Pari accesso e nessuna discriminazione; rilevare e correggere i bias lungo tutto il ciclo di vita.\u003c/div>\u003c/div>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>🌱 Innovazione etica e responsabile\u003c/div>\u003cdiv class='mcp'>L'IA supporta competenze autentiche senza sostituire impegno, riflessione e autonomia.\u003c/div>\u003c/div>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>♻️ Sostenibilità\u003c/div>\u003cdiv class='mcp'>Equilibrio sociale, economico e ambientale; valore delle relazioni umane.\u003c/div>\u003c/div>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>🛡️ Tutela dei diritti\u003c/div>\u003cdiv class='mcp'>Protezione dei dati, riservatezza, dignità; privacy by design e by default, minimizzazione.\u003c/div>\u003c/div>\n    \u003cdiv class='mc'>\u003cdiv class='mct'>🔒 Sicurezza dei sistemi\u003c/div>\u003cdiv class='mcp'>Standard tecnici elevati: riservatezza, integrità e disponibilità dei dati trattati.\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003ch4 style='font-family:var(--display);margin:18px 0 8px'>Ruoli e responsabilità\u003c/h4>\n  \u003cdiv class='steps'>\n    \u003cdiv class='step'>\u003cdiv class='step-n'>1\u003c/div>\u003cdiv>\u003cdiv class='step-t'>La scuola è «deployer»\u003c/div>\u003cdiv class='step-p'>Ai sensi dell'AI Act, l'Istituzione scolastica utilizza il sistema di IA sotto la propria autorità: deve usarlo conformemente alle istruzioni del fornitore e garantirne il monitoraggio da parte di personale formato.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class='step'>\u003cdiv class='step-n'>2\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Il Dirigente è titolare del trattamento\u003c/div>\u003cdiv class='step-p'>Ha la responsabilità primaria della governance: definisce ruoli, autorizza il personale al trattamento e assicura sorveglianza umana e monitoraggio continuo, supportato dal DPO.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class='step'>\u003cdiv class='step-n'>3\u003c/div>\u003cdiv>\u003cdiv class='step-t'>Coinvolgimento di personale e famiglie\u003c/div>\u003cdiv class='step-p'>Le scelte sull'IA si condividono con personale, studenti e famiglie tramite gli organi collegiali.\u003c/div>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class='ib dan'>\u003cdiv class='ibt'>Prima di trattare dati personali: DPIA (e FRIA se ad alto rischio)\u003c/div>\n  \u003cp>La scuola, come titolare, deve svolgere una \u003cstrong>valutazione d'impatto sulla protezione dei dati (DPIA)\u003c/strong> prima del trattamento. Se il sistema è classificato \u003cstrong>ad alto rischio\u003c/strong> dall'AI Act (es. sistemi che determinano accesso/ammissione, valutano gli apprendimenti o sorvegliano gli studenti durante le prove), la DPIA va integrata con la \u003cstrong>FRIA\u003c/strong>, la valutazione d'impatto sui diritti fondamentali (art. 27 AI Act).\u003c/p>\u003c/div>\n\n  \u003cdiv class='ib suc'>\u003cdiv class='ibt'>Pratiche vietate dall'AI Act (art. 5) a scuola\u003c/div>\n  \u003cp>Sono vietati tecniche manipolative, social scoring, categorizzazione biometrica e — espressamente in ambito educativo — i sistemi che \u003cstrong>riconoscono le emozioni\u003c/strong> degli studenti (sentiment/emotion analysis), salvo motivi medici o di sicurezza.\u003c/p>\u003c/div>\n\n  \u003ch4 style='font-family:var(--display);margin:18px 0 8px'>Il framework: 5 fasi di un progetto IA\u003c/h4>\n  \u003ctable class='dtbl'>\n    \u003ctr>\u003cth>Fase\u003c/th>\u003cth>In sintesi\u003c/th>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Definizione\u003c/strong>\u003c/td>\u003ctd>Individuare aree e casi d'uso, valutare la maturità digitale, approvazione iniziale.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Pianificazione\u003c/strong>\u003c/td>\u003ctd>Piano di progetto e piano di gestione dei rischi (privacy, bias, sicurezza).\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Adozione\u003c/strong>\u003c/td>\u003ctd>Avvio graduale, con comunicazione e formazione del personale.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Monitoraggio\u003c/strong>\u003c/td>\u003ctd>Controllo di anomalie e output, rivalutazione periodica dei rischi.\u003c/td>\u003c/tr>\n    \u003ctr>\u003ctd>\u003cstrong>Conclusione\u003c/strong>\u003c/td>\u003ctd>Verifica dei risultati, lezioni apprese, condivisione delle buone pratiche.\u003c/td>\u003c/tr>\n  \u003c/table>\n\n  \u003cdiv class='ib tea'>\u003cdiv class='ibt'>Cosa dice il MIM per il personale amministrativo (DSGA e ATA)\u003c/div>\n  \u003cp>Le Linee guida indicano come esempi: \u003cstrong>organizzazione delle richieste\u003c/strong> (chatbot per smistare domande frequenti su orari, iscrizioni, certificazioni), \u003cstrong>gestione di comunicazioni periodiche\u003c/strong> (circolari con scadenze, es. copertura assicurativa) e \u003cstrong>supporto alla gestione dei beni mobili\u003c/strong> (analisi dei fabbisogni d'acquisto). Sempre come supporto ai processi di back-office, mai in sostituzione delle piattaforme e con sorveglianza umana.\u003c/p>\u003c/div>\n\n  \u003cdiv class='norma'>\u003cspan class='norma-ico'>📋\u003c/span>\u003cdiv>\u003cdiv class='norma-t'>Riferimenti\u003c/div>\u003cdiv class='norma-d'>DM 166/2025 e Linee guida MIM (vers. 1.0, 2025) · AI Act (Reg. UE 2024/1689) · GDPR · governance e mappa delle sperimentazioni sulla piattaforma Unica.\u003c/div>\u003c/div>\u003c/div>\n  "}],"quiz":[{"q":"Quale classificazione assegna l'AI Act ai sistemi IA per valutare gli studenti?","opts":["Rischio minimo — nessun adempimento","Rischio limitato — solo trasparenza","Alto rischio — supervisione umana e documentazione obbligatorie","Inaccettabile — completamente vietati"],"cor":2,"exp":"L'AI Act (Reg. UE 2024/1689), art. 6 e Allegato III, classifica esplicitamente come 'alto rischio' i sistemi IA in ambito educativo per valutare, selezionare o orientare studenti. Richiedono documentazione tecnica, supervisione umana e trasparenza."},{"q":"Il GDPR art. 28 richiede che la scuola stipuli un DPA con il fornitore IA:","opts":["Solo per i dati sanitari degli alunni","Per qualsiasi trattamento di dati personali per conto della scuola","Solo se il fornitore è estero","Solo per dati di minori under 16"],"cor":1,"exp":"Il GDPR art. 28 è generale: qualsiasi responsabile del trattamento che elabora dati personali per conto della scuola deve avere un DPA. Senza DPA, ogni uso su dati personali — anche comuni — è una violazione."},{"q":"Cosa ha fatto il Garante Privacy italiano riguardo a ChatGPT nel marzo 2023?","opts":["Ha multato OpenAI","Ha bloccato temporaneamente ChatGPT per violazione del GDPR sui dati degli utenti italiani","Ha approvato l'uso di ChatGPT in tutte le scuole","Ha richiesto l'uso solo per adulti"],"cor":1,"exp":"Il Garante ha disposto il blocco temporaneo per: assenza di base giuridica per il trattamento, nessuna informativa agli utenti, mancanza di protezioni per i minori. ChatGPT è stato ripristinato dopo adeguamenti da parte di OpenAI."},{"q":"La policy IA della scuola deliberata in CdI si fonda principalmente su:","opts":["Solo il GDPR europeo","DPR 275/1999 (autonomia scolastica) + GDPR art. 24 + D.Lgs. 82/2005","Solo le circolari MIUR","Esclusivamente l'AI Act"],"cor":1,"exp":"Il DPR 275/1999 conferisce autonomia organizzativa agli istituti. Il GDPR art. 24 impone misure tecniche e organizzative adeguate. Il D.Lgs. 82/2005 (CAD) promuove strumenti digitali nella PA. La delibera del CdI esercita questa autonomia."},{"q":"Quale norma italiana istituisce l'obbligo di alfabetizzazione digitale per il personale scolastico?","opts":["D.Lgs. 196/2003 (Codice Privacy)","DPR 445/2000 (Documentazione amministrativa)","L. 107/2015 art. 1 cc. 56-57 (Piano Nazionale Scuola Digitale)","D.Lgs. 165/2001 (Pubblico impiego)"],"cor":2,"exp":"La L. 107/2015 (La Buona Scuola), art. 1 cc. 56-57, istituisce il Piano Nazionale Scuola Digitale (PNSD) che include l'obbligo di formazione digitale per tutto il personale scolastico, docente e ATA."},{"q":"Secondo le Linee guida MIM, nella gestione di un sistema di IA la scuola agisce come…","opts":["fornitore del sistema","«deployer» (utilizzatore) sotto la propria autorità","autorità di controllo","sviluppatore del modello"],"cor":1,"exp":"L'Istituzione scolastica è «deployer» ai sensi dell'AI Act; il Dirigente è titolare del trattamento dei dati."},{"q":"Quando va integrata la FRIA (valutazione d'impatto sui diritti fondamentali)?","opts":["Per ogni email inviata","Mai, basta il consenso","Quando si usa un sistema di IA ad alto rischio","Solo nelle scuole paritarie"],"cor":2,"exp":"La FRIA (art. 27 AI Act) integra la DPIA per i sistemi classificati ad alto rischio."},{"q":"Quale principio impone che l'uomo resti centrale e possa intervenire sugli output dell'IA?","opts":["Sostenibilità","Intervento e sorveglianza umana","Automazione totale","Massimizzazione dei dati"],"cor":1,"exp":"La sorveglianza umana consente di individuare anomalie ed errori e intervenire a tutela degli interessati."}]},{"id":3,"title":"Segreteria: Documenti e Comunicazioni","icon":"📄","time":"35 min","fo":"ata","obj":["Applicare la formula RCOF per prompt efficaci","Generare circolari professionali in 5-10 minuti","Costruire un repertorio di risposte email tipo","Produrre verbali partendo da appunti","Gestire comunicazioni multilingua"],"check":["So applicare la formula RCOF a qualsiasi richiesta","Ho generato almeno una circolare reale con l'IA","Ho creato un repertorio di almeno 3 risposte email tipo","Ho sperimentato la generazione di un verbale da appunti","Ho salvato almeno un template riutilizzabile per la segreteria"],"secs":[{"t":"Il valore del tempo: quanto vale l'IA in segreteria","sl":{"prova":"Calcola il tuo risparmio potenziale personale: conta quante circolari, email tipo e verbali produci in un mese tipico. Moltiplica per i minuti risparmiati dalla tabella (circolare: 25 min; email: 8 min; verbale: 60 min). Dividi per 60 per avere le ore. Questo è il tuo 'dividendo di tempo' mensile.","rifl":"Con quelle ore risparmiate, cosa potresti fare di più utile per la tua scuola? Più tempo per le famiglie? Meno straordinari? Attività di qualità superiore?"},"h":"\u003cdiv style='overflow-x:auto'>\u003ctable class='dtbl'>\u003cthead>\u003ctr>\u003cth>Attività\u003c/th>\u003cth>Tempo attuale\u003c/th>\u003cth>Con IA\u003c/th>\u003cth>Risparmio\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Circolare standard\u003c/td>\u003ctd>30-45 min\u003c/td>\u003ctd>5-10 min\u003c/td>\u003ctd>~75%\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Email risposta famiglia (routine)\u003c/td>\u003ctd>8-12 min\u003c/td>\u003ctd>1-3 min\u003c/td>\u003ctd>~80%\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Verbale consiglio di classe\u003c/td>\u003ctd>60-90 min\u003c/td>\u003ctd>15-25 min\u003c/td>\u003ctd>~70%\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Comunicazione multilingua (1 lingua)\u003c/td>\u003ctd>40-60 min\u003c/td>\u003ctd>5-8 min\u003c/td>\u003ctd>~88%\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Bozza sezione PTOF\u003c/td>\u003ctd>3-4 ore\u003c/td>\u003ctd>40-60 min\u003c/td>\u003ctd>~75%\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">D.Lgs. 165/2001 — art. 7-ter\u003c/div>\u003cdiv class=\"norma-d\">Le PA devono adottare misure organizzative per l'efficienza e la produttività. L'uso dell'IA per supportare le attività amministrative rientra nell'ottimizzazione dei processi prevista dalla normativa sul pubblico impiego.\u003c/div>\u003c/div>\u003c/div>"},{"t":"La formula RCOF: il segreto dei prompt professionali","sl":{"prova":"ESERCIZIO CHIAVE — fai questo ora: 1) Scrivi un prompt vago: 'Fai una circolare per i genitori.' Inseriscilo nell'IA e salva l'output. 2) Ora scrivi un prompt RCOF completo per la stessa circolare (scegli tu l'argomento reale). Inseriscilo nell'IA. 3) Confronta i due output fianco a fianco. Fotografia o stampa entrambi — la differenza è immediata e convincente.","rifl":"Qual è la comunicazione che invii più spesso alle famiglie? Scrivi ORA il prompt RCOF completo per quella comunicazione e salvalo come 'Template #1'. Sarà il tuo primo pezzo della biblioteca prompt."},"h":"\u003cdiv class='hb'>\u003cdiv class='hbt'>⭐ La formula RCOF\u003c/div>\u003cdiv class='hbc'>🎭 RUOLO: 'Sei la segretaria dell'IC [nome] di [città]'\n📋 COMPITO: 'Scrivi una circolare ufficiale per comunicare...'\n📍 CONTESTO: '...alle famiglie che il 20 novembre ci sono i colloqui...'\n📐 FORMATO: '...formato circolare scolastica italiana con numero protocollo e firma DS'\n\nBase normativa: DPR 445/2000 art. 3 — gli atti amministrativi\ndevono riportare data, protocollo e firma del responsabile.\u003c/div>\u003c/div>\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>❌ Prompt vago\u003c/div>\u003cdiv class='mcp'>'Scrivi una comunicazione ai genitori per i colloqui' → Output generico, senza date, senza struttura scolastica, inutilizzabile direttamente.\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>✅ Prompt RCOF\u003c/div>\u003cdiv class='mcp'>'Sei la segretaria dell'IC [nome]. Circolare n.45/2025 ai genitori 2B, colloqui il 20/11 dalle 16-19 aule docenti, prenotazione su Argo entro 17/11, firma DS [nome]. Circolare scolastica italiana.' → Usabile con minima revisione.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Circolari e comunicazioni ufficiali","sl":{"prova":"Genera ORA una circolare reale che devi (o dovresti) inviare questa settimana. Usa il prompt RCOF che hai scritto nell'esercizio precedente. Poi applica questa checklist: ✓ Data corretta? ✓ Protocollo? ✓ Nome DS corretto? ✓ Orari verificati? ✓ Link funzionanti? Conta quanti elementi devi correggere e quanto tempo hai impiegato in totale.","rifl":"Pensa a 3 tipologie di circolari che redigi regolarmente (inizio anno, colloqui, uscite didattiche). Scrivi il prompt RCOF per ciascuna e salvali in un file Word o Google Doc intitolato 'Miei Template Circolari'."},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Circolare standard completa\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Sei la segretaria dell'IC [nome] di [città].\nScrivi circolare ufficiale:\n\nNumero: [N]/[anno] — Data: [data]\nOggetto: [oggetto specifico]\nDestinatari: [Docenti / Genitori / Alunni]\n\n[Descrivi il contenuto: chi, cosa, quando, dove, come]\n\nFirma: Il Dirigente Scolastico [nome]\n\nFormato: circolare scolastica italiana con\nintestazione completa, numero protocollo,\noggetto in grassetto, corpo formale,\nfirma e nota [BOZZA — verificare prima della firma].\nBase: DPR 445/2000 art. 3.\u003c/pre>\u003cdiv class='prl'>✨ Checklist obbligatoria prima della pubblicazione\u003c/div>\u003cdiv class='prt'>✓ Numero protocollo · ✓ Data aggiornata · ✓ Nomi corretti · ✓ Date/orari verificati · ✓ Link funzionanti · ✓ Intestazione completa\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">DPR 445/2000 — DPR 28 dicembre 2000 n. 445, art. 3\u003c/div>\u003cdiv class=\"norma-d\">Il Testo Unico sulla Documentazione Amministrativa stabilisce i requisiti formali degli atti della PA: data, numero di protocollo, firma del responsabile. L'IA produce la bozza — la verifica e la firma restano sempre di competenza umana.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Email con le famiglie: il repertorio delle risposte tipo","sl":{"prova":"Costruisci ORA il tuo repertorio: pensa alle 5 email che ricevi più spesso in segreteria (assenze, certificati, iscrizioni, nulla osta, registro elettronico). Per ciascuna scrivi un prompt RCOF e genera la risposta tipo. Salva tutto in un documento condiviso con i colleghi intitolato 'Repertorio Email Segreteria [Nome Scuola]'. Stima il tempo risparmiato a settimana.","rifl":"Quante email simili ricevi a settimana? Moltiplicando il risparmio (8 min → 1 min = 7 min a email), qual è il totale mensile? Questo documento vale ore del tuo tempo ogni mese."},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Repertorio 5 risposte tipo\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Scrivi 5 risposte email tipo (50-80 parole ciascuna,\ntono professionale e cordiale) per la segreteria di\nun Istituto Comprensivo italiano:\n\n1. Genitore che comunica assenza per febbre\n2. Richiesta di certificato di frequenza\n3. Domanda su come accedere al registro elettronico\n4. Richiesta di nulla osta per trasferimento\n5. Richiesta di informazioni sulle iscrizioni\n\nOgni risposta deve avere: conferma ricezione,\nprocedura specifica, eventuali scadenze.\n[Personalizza con le procedure del tuo istituto]\u003c/pre>\u003cdiv class='prl'>✨ Risultato atteso\u003c/div>\u003cdiv class='prt'>5 risposte tipo in 3-4 minuti. Investimento iniziale: 20 min. Risparmio permanente: 30-40 min al giorno. Base: GDPR art. 5(1)(c) — minimizzazione dei dati nelle comunicazioni.\u003c/div>\u003c/div>"},{"t":"Verbali, multilingua e iscrizioni","sl":{"prova":"ESERCIZIO VERBALE: prendi gli appunti dell'ultima riunione a cui hai partecipato (anche solo 5-6 punti schematici). Inseriscili nell'IA con il prompt verbale. Confronta il risultato con il verbale ufficiale che hai già scritto (o che qualcuno ha scritto). Misura: quanto tempo ha richiesto il metodo tradizionale? Quanto l'IA?","rifl":"Nella tua scuola ci sono alunni con famiglie che non parlano italiano? Quante comunicazioni ufficiali gli arrivano in una lingua che non capiscono? Come potresti migliorare questa situazione con l'IA a partire dalla prossima settimana?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Verbale formale da appunti\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Trasforma questi appunti in verbale formale\ndel Consiglio di Istituto:\n\nData: [data] ore [ora] — Luogo: [luogo]\nPresidente: [nome] — Segretario: [nome]\nPresenti: [lista] — Assenti: [lista]\n\nAPPUNTI:\n[incolla gli appunti della riunione]\n\nFormato: verbale ufficiale scolastico con punti\nnumerati, DELIBERA N°X in evidenza,\nchiusura formale con spazi per firme.\nBase: DPR 416/1974 (organi collegiali).\u003c/pre>\u003cdiv class='prl'>✨ Da 60-90 minuti a 15-20 minuti\u003c/div>\u003cdiv class='prt'>La riduzione è reale: il verbale generato ha struttura formale corretta. Verifica sempre che le delibere corrispondano fedelmente alle decisioni prese nella riunione.\u003c/div>\u003c/div>\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Traduzione circolare in arabo\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Traduci questa circolare scolastica in arabo\nstandard formale per famiglie con figli\nin una scuola pubblica italiana.\nMantieni tono istituzionale e professionale.\nAggiungi il titolo originale in italiano\ntra parentesi in cima per l'archiviazione.\n\n[Incolla il testo della circolare]\u003c/pre>\u003cdiv class='prl'>✨ Lingue ben supportate\u003c/div>\u003cdiv class='prt'>Arabo, cinese (mandarino), rumeno, ucraino, albanese, spagnolo, bengali. Per comunicazioni critiche (provvedimenti disciplinari, atti legali) verifica sempre con un madrelingua.\u003c/div>\u003c/div>"}],"quiz":[{"q":"La formula RCOF per i prompt sta per:","opts":["Risposta, Controllo, Output, Feedback","Ruolo, Compito, Contesto, Formato","Revisione, Correzione, Ottimizzazione, Fine","Risposta, Circolare, Oggetto, Firma"],"cor":1,"exp":"RCOF = Ruolo + Compito + Contesto + Formato. Questa struttura fornisce all'IA tutte le informazioni per produrre output professionali e pertinenti nel registro scolastico corretto."},{"q":"Il DPR 445/2000 stabilisce che le circolari scolastiche devono avere:","opts":["Almeno 200 parole","Data, numero di protocollo e firma del responsabile","Approvazione dell'UST prima della pubblicazione","Intestazione in almeno due lingue"],"cor":1,"exp":"Il DPR 445/2000 (T.U. Documentazione Amministrativa), art. 3, stabilisce i requisiti formali degli atti PA: data, protocollo e firma del responsabile. L'IA produce la bozza — questi elementi vanno verificati e apposti dall'umano responsabile."},{"q":"Costruire un repertorio di risposte email tipo richiede circa:","opts":["Una giornata intera con un esperto","3-4 ore di investimento iniziale con risparmio permanente di 30-40 min al giorno","Nessun tempo — l'IA lo gestisce in automatico","15 settimane di lavoro progressivo"],"cor":1,"exp":"Il repertorio di risposte tipo richiede 3-4 ore iniziali per generare le risposte per le 10-15 casistiche più frequenti. L'investimento si ripaga in pochi giorni grazie al risparmio permanente di tempo."},{"q":"Quale principio GDPR si applica alle email con le famiglie?","opts":["Principio di finalità — usare i dati solo per lo scopo dichiarato","Principio di minimizzazione — le comunicazioni devono contenere solo i dati necessari","Principio di esattezza — tutte le informazioni devono essere accurate","Principio di integrità — protezione da accessi non autorizzati"],"cor":1,"exp":"Il GDPR art. 5(1)(c) stabilisce il principio di minimizzazione: i dati personali devono essere adeguati, pertinenti e limitati a quanto necessario. Le risposte email generate dall'IA aiutano a strutturare comunicazioni essenziali e precise."},{"q":"Per i verbali di organi collegiali, la base normativa di riferimento è:","opts":["Solo il GDPR art. 28","DPR 416/1974 sugli organi collegiali e DPR 445/2000","L. 241/1990 esclusivamente","AI Act art. 14"],"cor":1,"exp":"I verbali degli organi collegiali scolastici (CdI, Collegio Docenti, Consigli di Classe) sono disciplinati dal DPR 416/1974 che ne stabilisce funzioni e procedure. Il DPR 445/2000 disciplina i requisiti formali della documentazione. L'IA supporta la redazione rispettando entrambe le normative."},{"q":"Per le traduzioni nelle lingue delle famiglie straniere, l'IA è:","opts":["Inadatta — la qualità è troppo bassa per uso ufficiale","Utile per comunicazioni ordinarie; per atti critici verifica con un madrelingua","Perfetta per tutti i tipi di documento senza revisione","Utilizzabile solo con abbonamento premium"],"cor":1,"exp":"Per comunicazioni ordinarie (circolari informative, FAQ, comunicazioni di servizio) l'IA è molto efficace per arabo, cinese, rumeno e altre lingue comuni. Per atti con rilevanza legale o disciplinare, la verifica con un madrelingua è sempre prudente."}]},{"id":4,"title":"Segreteria: Gestione Amministrativa","icon":"⚙️","time":"28 min","fo":"ata","obj":["Gestire comunicazioni con USR e MIUR con riferimenti normativi corretti","Produrre documentazione BES/DSA nel rispetto della privacy","Redigere sezioni del PTOF e del RAV","Supportare organi collegiali e gestione del personale"],"check":["So verificare i riferimenti normativi generati dall'IA su normattiva.it","Conosco le regole GDPR per la documentazione BES/DSA","So produrre bozze di sezioni del PTOF con l'IA","Conosco quali atti del personale posso supportare con l'IA e quali no","Ho compreso gli obblighi del DPO nella scuola"],"secs":[{"t":"Comunicazioni con USR, AT e MIUR","sl":{"prova":"Vai su normattiva.it e cerca 'L. 241/1990 art. 3'. Leggi il testo dell'obbligo di motivazione degli atti amministrativi. Poi chiedi all'IA di generare una breve nota all'UST su un argomento che conosci bene. Identifica almeno un riferimento normativo che l'IA ha citato e verifica se esiste realmente su normattiva.it.","rifl":"Quante note ufficiali all'UST o al MIUR produce la tua scuola ogni anno? Quale tipologia ti prende più tempo? Come potrebbe cambiare il flusso con l'IA?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Nota ufficiale all'UST\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Sei il DSGA dell'IC [nome] di [città].\nScrivi una nota ufficiale all'UST di [città] per:\n[descrivi la questione in modo preciso]\n\nLa nota deve:\n- Avere oggetto sintetico e chiaro\n- Descrivere brevemente la fattispecie\n- Formulare la richiesta con precisione\nFormato: nota ufficiale con protocollo [BOZZA]\n\n⚠️ OBBLIGO: verifica TUTTI i riferimenti\nnormativi generati su normattiva.it prima dell'invio.\nBase: L. 241/1990 art. 3 (motivazione atti).\u003c/pre>\u003cdiv class='prl'>✨ Perché la verifica è obbligatoria\u003c/div>\u003cdiv class='prt'>L'IA può inventare norme plausibili. Per atti ufficiali all'UST, una norma errata può rendere l'atto impugnabile. La responsabilità è sempre del DSGA o del DS firmatario.\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">L. 241/1990 — Legge 7 agosto 1990 n. 241, art. 3\u003c/div>\u003cdiv class=\"norma-d\">Obbligo di motivazione degli atti amministrativi: ogni atto deve indicare i presupposti di fatto e le ragioni giuridiche. Atti con normative errate generate dall'IA possono essere annullabili — da qui l'obbligo assoluto di verifica su normattiva.it.\u003c/div>\u003c/div>\u003c/div>"},{"t":"PTOF, RAV e Piano di Miglioramento","sl":{"prova":"Raccolta dati per il tuo PTOF: prepara questi dati reali della tua scuola (puoi consultare il PTOF vigente): numero alunni, percentuale famiglie straniere, territorio (urbano/rurale/periferia), 2 punti di forza, 2 criticità. Poi usa il prompt RCOF per generare la sezione 'Analisi del contesto'. Confronta con quella attuale nel vostro PTOF: cosa ha catturato bene? Cosa manca?","rifl":"Chi si occupa della stesura del PTOF nella tua scuola? Quanto tempo ci vuole? Come potresti proporre l'uso dell'IA per il prossimo aggiornamento triennale?"},"h":"\u003cdiv class='pb'>\u003cdiv class='pb-hd'>\u003cdiv class='pb-lbl'>💬 PROMPT — Sezione PTOF: Analisi del contesto\u003c/div>\u003cspan class='pb-role ata'>Segreteria\u003c/span>\u003c/div>\u003cpre class='pt'>Sei il responsabile della stesura del PTOF\ndell'IC [nome] per il triennio 2025-2028.\n\nDati reali della scuola:\n- [N] alunni, [N] plessi\n- Territorio: [urbano/rurale/periferia]\n- Famiglie straniere: [%] — Provenienza: [paesi]\n- Livello socioeconomico: [basso/medio/alto]\n- Punti di forza: [specificare]\n- Criticità: [specificare]\n\nScrivi la sezione 'Analisi del contesto e\nbisogni formativi' — circa 400 parole —\nlinguaggio formale MIUR.\nBase normativa: DPR 275/1999, art. 3.\u003c/pre>\u003cdiv class='prl'>✨ Da 3-4 ore a 45 minuti\u003c/div>\u003cdiv class='prt'>L'IA produce la struttura narrativa. I dati statistici, le valutazioni qualitative e l'approvazione in CdI restano sempre competenza umana.\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">DPR 275/1999 — DPR 8 marzo 1999 n. 275, art. 3\u003c/div>\u003cdiv class=\"norma-d\">Il PTOF è approvato dal Consiglio di Istituto su proposta del Collegio dei Docenti. L'IA supporta la stesura delle sezioni narrative — l'approvazione formale degli organi collegiali è insostituibile e obbligatoria.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Documentazione BES/DSA: privacy assoluta","sl":{"prova":"ESERCIZIO SULLA PRIVACY: prendi un PDP generico (non reale) o inventane uno completamente fittizio. Inseriscilo nell'IA chiedendo di migliorarne la struttura narrativa. Poi prova a inserire lo stesso testo con dati reali inventati (nome fittizio, classe fittizia, diagnosi fittizia generica). Osserva cosa cambia. La regola: dati generici sì, dati identificativi no.","rifl":"Nella tua scuola, chi ha accesso ai PDP e ai PEI? Questi documenti sono archiviati digitalmente? Su quale sistema? Il DPO ne è a conoscenza?"},"h":"\u003cdiv class='ib dan'>\u003cdiv class='ibt'>🔒 Regola assoluta — da memorizzare\u003c/div>\u003cp>PDP, PEI, diagnosi cliniche, dati sanitari degli alunni = \u003cstrong>categorie speciali ai sensi del GDPR art. 9\u003c/strong>. MAI inserire dati identificativi reali in ChatGPT, Claude o qualsiasi strumento IA nella versione consumer. Sempre dati anonimi o codici.\u003c/p>\u003c/div>\u003cdiv class='g2'>\u003cdiv class='mc'>\u003cdiv class='mct'>✅ USO SICURO dell'IA\u003c/div>\u003cdiv class='mcp'>• Modelli anonimi di PDP/PEI\u003cbr>• Strutture generiche per tipo di BES\u003cbr>• Obiettivi tipo per categoria di disturbo\u003cbr>• Esempi di strumenti compensativi standard\u003c/div>\u003c/div>\u003cdiv class='mc'>\u003cdiv class='mct'>❌ VIETATO su IA pubbliche\u003c/div>\u003cdiv class='mcp'>• Nome e cognome dell'alunno reale\u003cbr>• Diagnosi specifica o clinica reale\u003cbr>• Dati terapeutici o farmacologici\u003cbr>• Qualsiasi dato identificativo sanitario\u003c/div>\u003c/div>\u003c/div>\u003cdiv class=\"norma\">\u003cspan class=\"norma-ico\">📋\u003c/span>\u003cdiv>\u003cdiv class=\"norma-t\">L. 170/2010 + DM 5669/2011 — Legge 8 ottobre 2010 n. 170 e DM 12 luglio 2011\u003c/div>\u003cdiv class=\"norma-d\">La L. 170 garantisce il diritto allo studio agli alunni con DSA e impone riservatezza assoluta sui dati. I dati del PDP sono sanitari (GDPR art. 9): il trattamento illecito è sanzionato fino a €20 milioni o 4% del fatturato del fornitore.\u003c/div>\u003c/div>\u003c/div>"},{"t":"Gestione del personale e organi collegiali","sl":{"prova":"Identifica 3 atti del personale che redigi ogni m
